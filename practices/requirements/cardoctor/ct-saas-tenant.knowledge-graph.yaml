# Knowledge Graph — ct-saas-tenant
boundary: "ct-saas-tenant"
version: "3"
last_updated: "2026-05-13"
owner_authority: "Architecture Authority + Business Authority"
metadata:
  purpose: "Nguồn chân lý (SoT) của control-plane SaaS Tenant cho vòng đời/hồ sơ tenant, người dùng tenant, đăng ký dịch vụ, tham chiếu chi nhánh/kho, hồ sơ phương tiện/nhà vận chuyển, hóa đơn/bảo hiểm, và trạng thái cung cấp dịch vụ."
  tech:
    language: "Java 21"
    framework: "Spring Boot 3.5.x + JPA + Flyway"
    data_store: "PostgreSQL 17.5 + Kafka"
  epics: []
  features:
    - "saas-tenant-onboarding"
    - "tenant-profile-update"
    - "tenant-lifecycle-activation"
    - "tenant-status-probing"
    - "tenant-confirmation"
    - "tenant-invoice-info"
    - "tenant-user-management"
    - "tenant-user-iam-provisioning"
    - "tenant-user-role-group-migration"
    - "tenant-operation-area"
    - "tenant-vehicle-profile"
    - "tenant-vehicle-profile-import"
    - "tenant-transporter-registry"
    - "tenant-transporter-registry-import"
    - "tenant-default-branch-warehouse"
    - "consultant-assignment"
    - "tenant-basic-info-cache"
  integration_consumers:
    - "ecom4g-agentic-design/integration-contracts/INTEG-BFF-agg-cop-graph.md"
apis:
  - name: "onboard-saas-tenant"
    path: "/api/v1/saas-tenant"
    method: "POST"
    purpose: "Tạo tenant SaaS mới, kiểm tra uniqueness, lưu hồ sơ tenant/subscription/invoice/business model và cache thông tin cơ bản."
  - name: "update-saas-tenant"
    path: "/api/v1/saas-tenant/{tenantId}"
    method: "PUT"
    purpose: "Cập nhật thông tin hồ sơ SaaS tenant, bao gồm thông tin công ty, business model, subscription metadata, operation areas, hóa đơn và consultant."
  - name: "update-tenant-invoice-info"
    path: "/api/v1/saas-tenant/{tenantId}/invoice-info"
    method: "PUT"
    purpose: "Cập nhật thông tin xuất hóa đơn của tenant và kích hoạt luồng đồng bộ invoice profile trong service."
  - name: "get-saas-tenant-by-id"
    path: "/api/v1/saas-tenant/{tenantId}"
    method: "GET"
    purpose: "Lấy chi tiết hồ sơ tenant SaaS theo id, gồm trạng thái vòng đời, thông tin hóa đơn, operation areas, consultant và số lượng branch/warehouse."
  - name: "get-saas-tenant-by-subdomain"
    path: "/api/v1/saas-tenant/subdomain/{subdomain}"
    method: "GET"
    purpose: "Tra cứu hồ sơ tenant SaaS theo subdomain."
  - name: "search-saas-tenants"
    path: "/api/v1/saas-tenant/search"
    method: "POST"
    purpose: "Tìm kiếm/paginate danh sách tenant SaaS theo criteria, tenant ids, type, stage, status, business model, subdomain, operation area, car profile và consultant."
  - name: "delete-saas-tenant"
    path: "/api/v1/saas-tenant/{tenantId}"
    method: "DELETE"
    purpose: "Dự kiến xóa/offboard tenant SaaS nhưng code hiện tại còn TODO và return null."
  - name: "toggle-saas-tenant-active-state"
    path: "/api/v1/saas-tenant/{tenantId}/toggle"
    method: "POST"
    purpose: "Kích hoạt hoặc vô hiệu hóa tenant SaaS, ghi reason khi deactivate và điều phối trạng thái subdomain/IAM theo service."
  - name: "search-tenant-vehicle-profiles"
    path: "/api/v1/saas-tenant/tenant-vehicle-profile/search"
    method: "POST"
    purpose: "Tìm kiếm cấu hình hồ sơ xe của tenant theo tenantId và bộ lọc brand/model/trim/year/type."
  - name: "search-saas-tenant-users"
    path: "/api/v1/saas-tenant/tenant-user/search"
    method: "POST"
    purpose: "Tìm kiếm người dùng thuộc một tenant SaaS theo tenantId và criteria."
  - name: "search-tenant-transporter-registries"
    path: "/api/v1/saas-tenant/tenant-transporter-registry/search"
    method: "POST"
    purpose: "Tìm kiếm đăng ký nhà vận chuyển/tuyến vận chuyển của tenant theo tenantId, criteria và status."
  - name: "complete-tenant-information"
    path: "/api/v1/saas-tenant/completed"
    method: "POST"
    purpose: "Đánh dấu danh sách tenant đã hoàn tất thông tin, chuyển stage/status và khởi động luồng activation/provisioning branch-warehouse mặc định khi đủ điều kiện."
  - name: "assign-quotation-consultant"
    path: "/api/v1/saas-tenant/consultant-assignment"
    method: "POST"
    purpose: "Gán consultant cho một hoặc nhiều tenant; endpoint chỉ bật khi feature Marketplace:QuotationConsultant bật."
  - name: "create-saas-tenant-user"
    path: "/api/v1/saas-tenant/create-user"
    method: "POST"
    purpose: "Tạo người dùng thuộc tenant SaaS, kiểm tra tenant/subscription/quyền role và có thể trigger IAM provisioning theo trạng thái tenant."
  - name: "create-tenant-transporter-registry"
    path: "/api/v1/saas-tenant/{tenantId}/transporter-registries"
    method: "POST"
    purpose: "Tạo một đăng ký nhà vận chuyển/tuyến vận chuyển cho tenant và phát event upsert registry sau khi lưu."
  - name: "edit-tenant-transporter-registries"
    path: "/api/v1/saas-tenant/edit-tenant-transporter-registry"
    method: "POST"
    purpose: "Bulk thêm/xóa đăng ký nhà vận chuyển của tenant theo tenantId, removeTransporterRegistryIds và addTransporterRegistryData."
  - name: "edit-tenant-vehicle-profiles"
    path: "/api/v1/saas-tenant/edit-tenant-vehicle-profile"
    method: "POST"
    purpose: "Bulk thêm/xóa hồ sơ xe của tenant theo tenantId, brand/model codes và tenant vehicle profile ids."
  - name: "retry-saas-tenant-iam-creation"
    path: "/api/v1/saas-tenant/{tenantId}/retry-iam"
    method: "POST"
    purpose: "Thử lại tạo IAM user cho các tenant user tạo thất bại hoặc còn thiếu iamUserId."
  - name: "retry-conversation-iam-user-sync"
    path: "/api/v1/saas-tenant/{tenantId}/retry-conversation-iam"
    method: "POST"
    purpose: "Thử lại đồng bộ user sang conversation service cho tenant."
  - name: "search-saas-tenant-basic-info"
    path: "/api/v1/saas-tenant/search-basic-info"
    method: "POST"
    purpose: "Tìm kiếm thông tin tenant cơ bản cho các consumer chỉ cần ngữ cảnh tenant, business profile, operation areas và transporter registries."
  - name: "import-transport-tenant-registries"
    path: "/api/v1/saas-tenant/import-transport-tenant"
    method: "POST"
    purpose: "Import danh sách transporter registry theo tenantCode sau bước verify."
  - name: "verify-import-transport-tenant-registries"
    path: "/api/v1/saas-tenant/verify-import-transport-tenant"
    method: "POST"
    purpose: "Kiểm tra dữ liệu import transporter registry trước khi import chính thức, trả từng item kèm isValid/note/id nếu có."
  - name: "verify-import-vehicle-tenant-profiles"
    path: "/api/v1/saas-tenant/verify-import-vehicle-tenant"
    method: "POST"
    purpose: "Kiểm tra dữ liệu import vehicle profile trước khi import chính thức, trả từng dòng kèm isValid/note."
  - name: "import-vehicle-tenant-profiles"
    path: "/api/v1/saas-tenant/import-vehicle-tenant/{tenantCode}"
    method: "POST"
    purpose: "Import danh sách vehicle profile cho tenant theo tenantCode sau bước verify."
  - name: "search-vehicle-profiles-grouped-by-brand"
    path: "/api/v1/saas-tenant/{tenantId}/search-vehicle-tenant"
    method: "GET"
    purpose: "Lấy danh sách vehicle profile của tenant được group theo car brand và car model."
  - name: "add-all-vehicles-to-tenant"
    path: "/api/v1/saas-tenant/{tenantId}/all-vehicle"
    method: "POST"
    purpose: "Gán toàn bộ vehicle profile/catalog hiện có cho tenant."
  - name: "basic-search-tenant-users"
    path: "/api/v1/saas-tenant/tenant-users/search/basic"
    method: "POST"
    purpose: "Tìm kiếm batch thông tin người dùng tenant cơ bản theo tenantId và danh sách phone/email/iamUserId."
  - name: "get-default-branch-info"
    path: "/api/v1/saas-tenant/{tenantId}/default-branch"
    method: "GET"
    purpose: "Lấy tổng số branch, chi tiết default branch và default warehouse của tenant cho tab Chi nhánh."
  - name: "get-default-warehouse-info"
    path: "/api/v1/saas-tenant/{tenantId}/default-warehouse"
    method: "GET"
    purpose: "Lấy tổng số warehouse và chi tiết default warehouse của tenant cho tab Kho."
  - name: "search-tenant-users"
    path: "/api/v1/tenant-users/search"
    method: "GET"
    purpose: "Tìm kiếm danh sách tenant users bằng query/model attributes; dùng TenantUserService read model tích hợp IAM/tenant metadata."
  - name: "pt-create-saas-tenant-user"
    path: "/api/pt/saas-tenant/create-user"
    method: "POST"
    purpose: "Tạo người dùng tenant qua luồng PT, gọi PTSaasTenantServiceImpl và trả username/temporaryPassword."
  - name: "legacy-update-tenant"
    path: "/api/v1/tenants/{tenantId}"
    method: "PUT"
    purpose: "Luồng cập nhật tenant legacy; codebase guide khuyến nghị dùng SaaS path thay thế."
  - name: "legacy-get-tenant-by-subdomain"
    path: "/api/v1/tenants/subdomain/{subdomain}"
    method: "GET"
    purpose: "Luồng tra cứu tenant legacy theo subdomain; dùng SaaS tenant API cho luồng hiện hành."
  - name: "legacy-delete-tenant"
    path: "/api/v1/tenants/{tenantId}"
    method: "DELETE"
    purpose: "Luồng xóa tenant legacy."
  - name: "legacy-retry-tenant-iam-creation"
    path: "/api/v1/tenants/{tenantId}/retry-iam"
    method: "POST"
    purpose: "Thử lại tạo IAM legacy cho tenant users."
  - name: "legacy-list-regions"
    path: "/api/v1/tenants/regions"
    method: "GET"
    purpose: "Trả danh sách region và areaCodes từ RegionCacheService."
  - name: "protected-list-saas-vendors"
    path: "/protected/v1/saas-tenant/vendors"
    method: "GET"
    purpose: "Tra cứu danh sách vendor SaaS cho service-to-service consumer."
  - name: "protected-search-saas-tenant-basic-info"
    path: "/protected/v1/saas-tenant/search-basic-info"
    method: "POST"
    purpose: "Tìm kiếm thông tin tenant cơ bản cho internal services."
  - name: "protected-get-saas-tenant-basic-info"
    path: "/protected/v1/saas-tenant/{tenantId}"
    method: "GET"
    purpose: "Lấy thông tin tenant SaaS rút gọn cho internal services."
  - name: "protected-get-consultant-assignment-by-tenant"
    path: "/protected/v1/saas-tenant/{tenantId}/consultant-assignment"
    method: "GET"
    purpose: "Lấy danh sách consultant assignment hiện hành/lịch sử theo tenant."
  - name: "protected-migrate-consultant-assignment"
    path: "/protected/v1/saas-tenant/consultant-assignment"
    method: "POST"
    purpose: "Tạo/migrate consultant assignments khi feature Marketplace:QuotationConsultant bật."
  - name: "protected-get-saas-tenant-iam-users"
    path: "/protected/v1/saas-tenant/users"
    method: "GET"
    purpose: "Tra cứu tenant và users IAM theo danh sách tenantIds, có thể lọc roleCode."
  - name: "protected-update-tenant-status"
    path: "/protected/v1/saas-tenant/update-tenant-status"
    method: "POST"
    purpose: "Chạy job cập nhật trạng thái tenant theo trạng thái subdomain/runtime."
  - name: "protected-confirm-tc-and-data-privacy"
    path: "/protected/v1/saas-tenant/{tenantId}/tc-data-privacy-confirmed"
    method: "POST"
    purpose: "Xác nhận tenant đã đồng ý điều khoản và data privacy."
  - name: "protected-confirm-ecommerce"
    path: "/protected/v1/saas-tenant/{tenantId}/ecommerce-confirmed"
    method: "POST"
    purpose: "Xác nhận tenant đã hoàn tất ecommerce confirmation."
  - name: "protected-list-quotation-consultant-vendors"
    path: "/protected/v1/saas-tenant/qc-vendors"
    method: "GET"
    purpose: "Tra cứu danh sách vendor phục vụ quotation consultant."
  - name: "protected-get-tenant-transporter-registry"
    path: "/protected/v1/saas-tenant/tenant-transporter-registry/{id}"
    method: "GET"
    purpose: "Lấy chi tiết một tenant transporter registry theo id."
  - name: "protected-get-tenant-transporter-registries"
    path: "/protected/v1/saas-tenant/tenant-transporter-registry"
    method: "POST"
    purpose: "Lấy danh sách tenant transporter registry theo danh sách id."
  - name: "protected-change-tenant-user-status"
    path: "/protected/v1/saas-tenant/{userId}/status"
    method: "PUT"
    purpose: "Cập nhật trạng thái local tenant user và đồng bộ trạng thái sang IAM protected API."
  - name: "protected-search-saas-tenants"
    path: "/protected/v1/saas-tenant/search"
    method: "POST"
    purpose: "Tìm kiếm/paginate tenant SaaS cho internal services."
  - name: "protected-get-all-saas-tenant-users"
    path: "/protected/v1/saas-tenant/all-users"
    method: "GET"
    purpose: "Lấy tất cả tenant users theo tenantType cho internal services."
  - name: "protected-get-tenant-basic-info-from-cache"
    path: "/protected/v1/saas-tenant/cache/{tenantId}"
    method: "GET"
    purpose: "Lấy tenant basic info từ Redis cache."
  - name: "protected-reload-tenant-cache"
    path: "/protected/v1/saas-tenant/cache/reload"
    method: "POST"
    purpose: "Reload toàn bộ tenant cache."
  - name: "protected-batch-update-tenant-subdomain"
    path: "/protected/v1/saas-tenant/batch-update-subdomain"
    method: "POST"
    purpose: "Cập nhật subdomain hàng loạt cho các tenant hiện có."
  - name: "protected-legacy-list-vendors"
    path: "/protected/v1/tenants/vendors"
    method: "GET"
    purpose: "Tra cứu vendor nội bộ legacy; dùng SaaS protected vendors cho luồng hiện hành."
  - name: "protected-legacy-get-tenant-iam-users"
    path: "/protected/v1/tenants/users"
    method: "GET"
    purpose: "Tra cứu tenant users nội bộ legacy theo tenantIds."
  - name: "protected-update-tenant-location-and-create-branch"
    path: "/protected/v1/tenant/update-location-and-create-branch"
    method: "POST"
    purpose: "Cập nhật city/ward của tenant và khởi động tạo default branch/warehouse nếu chưa tồn tại."
  - name: "protected-migrate-tenant-users"
    path: "/protected/v1/migration/tenant-users/{batchSize}"
    method: "POST"
    purpose: "Migration groupId cho tenant users từ roleCode và cập nhật custom groupRoles sang IAM."

events:
  produces:
    - name: "TENANT_ACTIVATED"
      topic: "AC-DEV-TENANT-ACTIVATION"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TENANT-ACTIVATION / ACTIVATED.1 — được ActiveTenantListener phát qua TenantActivationPublisher sau khi tenant hoàn tất thông tin."
      trigger: "ActiveTenantListener handles ActiveTenantEvent after tenant information is completed, triggers Jenkins subdomain creation, then publishes activation message."
      producer: "event/listener/ActiveTenantListener.publishTenantActivationMessage -> client/kafka/TenantActivationPublisher.publish"
      payload_summary: "TenantActivationRequest được serialize vào TenantMessage data với code, name, tenantId, opsAreaCodes, address và tenantType; headers MessageGroup=TENANT-ACTIVATION, MessageStep=ACTIVATED.1, OriginTenantId=tenant.id, OriginMessageCode=tenant.code."
      consumers: ["downstream tenant activation/accounting/runtime provisioning consumers"]
      idempotency_key: "Kafka key is TenantMessage.messageId UUID; OriginMessageCode is tenant.code."

    - name: "TENANT_SYNC_TO_ACCOUNTING"
      topic: "AC-DEV-TENANT-ACTIVATION"
      schema_version: 1
      implementation_status: "active_in_source_but_feature_flagged"
      meaning: "TENANT-ACTIVATION / SYNC_TO_ACCOUNTING.1 — được SaasTenantServiceImpl phát khi trạng thái tenant hoặc tenant users cần đồng bộ accounting; payload là array và bỏ qua publish khi sync-to-accounting=false."
      trigger: "ActiveTenantListener.syncTenantToAccounting and SaasTenantServiceImpl.syncTenantToAccounting publish after tenant activation/status changes when sync-to-accounting=true."
      producer: "event/listener/ActiveTenantListener.syncTenantToAccounting; service/impl/SaasTenantServiceImpl.syncTenantToAccounting -> client/kafka/TenantActivationPublisher.publish"
      payload_summary: "JSON array gồm TenantSyncToAccountingRequest; dòng tenant gốc luôn được đưa vào và SaasTenantServiceImpl có thể thêm dòng express tenant khi tồn tại user EXPRESS_EMPLOYEE."
      consumers: ["accounting/ERP tenant sync consumers"]
      idempotency_key: "Kafka key is TenantMessage.messageId UUID; OriginMessageCode is tenant.code."

    - name: "TENANT_PROVISIONED"
      topic: "AC-DEV-TENANT-PROVISIONING"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TENANT-PROVISIONING / TENANT_PROVISIONED.1 — được SaasTenantServiceImpl#createDefaultBranchAndWarehouse phát để yêu cầu provisioning default branch/warehouse khi Inventory:InventoryStockV01 bật."
      trigger: "SaasTenantServiceImpl.createDefaultBranchAndWarehouse or updateTenantLocationAndCreateBranch calls publishTenantProvisionedEvent after validating provisioning location."
      producer: "service/impl/SaasTenantServiceImpl.publishTenantProvisionedEvent -> client/kafka/TenantProvisionedEventPublisher.publish"
      payload_summary: "TenantProvisionedEventPayload gồm tenantCode, tenantName, tenantType, address, city, ward, phone, email, taxCode, subscriptionPlan, maxBranches, maxUsers, maxWarehouses, validFrom và validUntil; headers MessageGroup=TENANT-PROVISIONING, MessageStep=TENANT_PROVISIONED.1."
      consumers: ["gf-system", "gf-inventory"]
      idempotency_key: "Kafka key is OriginTenantId; OriginMessageCode is tenant.code."

    - name: "TENANT_USER_CREATED"
      topic: "AC-DEV-TENANT-USER-CREATED-RESULTS"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TenantUserCreatedEvent — được IamServiceImpl phát qua TenantUserCreatedPublisher sau khi tạo IAM user thành công cho SaaS tenant user."
      trigger: "IamServiceImpl.createUser calls TenantUserCreatedPublisher.publishEvent after IAM user creation succeeds."
      producer: "service/impl/IamServiceImpl -> client/kafka/publisher/TenantUserCreatedPublisher.publishEvent"
      payload_summary: "TenantUserCreatedEvent kế thừa BaseEvent và gồm tenantId, tenantType, iamUserId, tempPassword, phone, emailAddress, roleCode, avatarUrl, fullName, iamCreationStatus và status; eventType=TenantUserCreatedEvent, eventVersion=v1, source=ct-saas-tenant."
      consumers: ["tenant user lifecycle result consumers"]
      idempotency_key: "Kafka key is TenantUserCreatedEvent.eventId UUID."

    - name: "TENANT_USER_PROVISION_RESULT"
      topic: "AC-DEV-TENANT-USER-PROVISION-RESULTS"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TenantUserProvisionedEvent / TenantUserProvisionFailedEvent — được EmployeeServiceImpl phát qua TenantUserProvisionedPublisher sau khi xử lý tenant user provisioning requests."
      trigger: "EmployeeServiceImpl.handleTenantUserProvisionRequested publishes success after creating/updating IAM user or failure when validation/IAM provisioning fails."
      producer: "service/impl/EmployeeServiceImpl -> client/kafka/publisher/TenantUserProvisionedPublisher.publishProvisionedEvent|publishProvisionFailedEvent"
      payload_summary: "Payload thành công TenantUserProvisionedEvent gồm tenantId, tenantType, employeeId, iamUserId, tempPassword, phone và isExistingAccount. Payload thất bại TenantUserProvisionFailedEvent gồm tenantId, tenantType, employeeId và errorMessage. Cả hai kế thừa BaseEvent với eventVersion=v1 và source=ct-saas-tenant."
      consumers: ["tenant user lifecycle result consumers"]
      idempotency_key: "Kafka key is Employee-{employeeId}; eventId is generated UUID inside payload."

    - name: "TENANT_USER_DISABLED"
      topic: "AC-DEV-TENANT-USER-DISABLE-RESULTS"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TenantUserDisabledEvent — được EmployeeServiceImpl phát qua TenantUserDisabledPublisher sau khi xử lý disable request hoặc employee termination."
      trigger: "EmployeeServiceImpl.handleTenantUserDisableRequested or handleEmployeeTerminated publishes after local tenant_user is deactivated and IAM status is set INACTIVE when needed."
      producer: "service/impl/EmployeeServiceImpl -> client/kafka/publisher/TenantUserDisabledPublisher.publishDisabledEvent"
      payload_summary: "TenantUserDisabledEvent kế thừa BaseEvent và gồm tenantId, tenantType, employeeId và iamUserId; eventType=TenantUserDisabledEvent, eventVersion=v1, source=ct-saas-tenant."
      consumers: ["tenant user lifecycle result consumers"]
      idempotency_key: "Kafka key is Employee-{employeeId}; eventId is generated UUID inside payload."

    - name: "TENANT_USER_ENABLED"
      topic: "AC-DEV-TENANT-USER-ENABLE-RESULTS"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TenantUserEnabledEvent — được EmployeeServiceImpl phát qua TenantUserEnabledPublisher sau khi xử lý enable request."
      trigger: "EmployeeServiceImpl.handleTenantUserEnableRequested publishes after local tenant_user is activated and IAM tenant metadata/status is updated."
      producer: "service/impl/EmployeeServiceImpl -> client/kafka/publisher/TenantUserEnabledPublisher.publishEnabledEvent"
      payload_summary: "TenantUserEnabledEvent kế thừa BaseEvent và gồm tenantId, tenantType, employeeId và iamUserId; eventType=TenantUserEnabledEvent, eventVersion=v1, source=ct-saas-tenant."
      consumers: ["tenant user lifecycle result consumers"]
      idempotency_key: "Kafka key is Employee-{employeeId}; eventId is generated UUID inside payload."

    - name: "TENANT_INVOICE_INFO_UPSERT_REQUESTED"
      topic: "AC-DEV-TENANT-INVOICE-INFO"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TENANT_INVOICE_PROFILE_COMMANDS / TENANT_INVOICE_INFO_UPSERT_REQUESTED — được TenantInvoiceInfoUpdatedListener phát sau khi invoice info của activated tenant thay đổi và transaction commit."
      trigger: "SaasTenantServiceImpl publishes TenantInvoiceInfoUpdatedEvent after activated tenant invoice info changes or after completed GARAGE tenants are processed with PurchaseV02 enabled; listener sends Kafka after transaction commit."
      producer: "service/impl/SaasTenantServiceImpl.publishTenantInfoUpdatedEvent -> event/listener/TenantInvoiceInfoUpdatedListener.handleTenantInvoiceInfoUpdatedEvent"
      payload_summary: "TenantInvoiceInfoCommandPayload gồm tenantId, invoiceInfo.companyName, taxCode, companyEmailAddress, companyAddress, updatedBy và changeSource, được bọc trong TenantMessage với MessageGroup=TENANT_INVOICE_PROFILE_COMMANDS và MessageStep=TENANT_INVOICE_INFO_UPSERT_REQUESTED."
      consumers: ["tenant invoice profile command consumers"]
      idempotency_key: "Kafka key is TenantMessage.messageId UUID; OriginMessageCode is tenant.code."

    - name: "TENANT_TRANSPORTER_REGISTRY_UPSERT_REQUESTED"
      topic: "AC-DEV-TENANT-TRANSPORTER-REGISTRY-TOPIC"
      schema_version: 1
      implementation_status: "active_in_source"
      meaning: "TENANT-TRANSPORTER-REGISTRY / TENANT_TRANSPORTER_REGISTRY_UPSERT_REQUESTED — được TenantTransporterRegistryCreatedListener phát sau khi thay đổi transporter registry commit; payload data là danh sách registry objects."
      trigger: "SaasTenantServiceImpl creates/imports/upserts transporter registry rows and publishes TenantTransporterRegistryCreatedEvent; listener sends Kafka after transaction commit."
      producer: "service/impl/SaasTenantServiceImpl.buildTenantTransporterRegistryCreatedEvent -> event/listener/TenantTransporterRegistryCreatedListener.handleTenantTransporterRegistryCreatedEvent"
      payload_summary: "JSON list dữ liệu transporter registry gồm id, tenantId, tenantType, transporterName, routeName, routeContactPhoneNumber, routeStartedAt, note, shippingAddress và status, được bọc trong TenantMessage với MessageGroup=TENANT-TRANSPORTER-REGISTRY và MessageStep=TENANT_TRANSPORTER_REGISTRY_UPSERT_REQUESTED."
      consumers: ["tenant transporter registry command consumers"]
      idempotency_key: "Kafka key is TenantMessage.messageId UUID; OriginMessageCode is null in current publisher."

    - name: "TENANT_SYNC_USER"
      topic: "AC-DEV-TENANT-SYNC-USER"
      schema_version: 1
      implementation_status: "implemented_but_current_call_path_commented_out"
      meaning: "USER / USER.1 — đã được TenantSyncUserPublisher triển khai nhưng runtime call path hiện đang comment trong ActiveTenantListener và SaasTenantServiceImpl."
      trigger: "No active runtime trigger in current source; syncUser call paths are commented out."
      producer: "client/kafka/TenantSyncUserPublisher.publish"
      payload_summary: "Payload TenantUser dự kiến được bọc trong TenantMessage với MessageGroup=USER và MessageStep=USER.1; source hiện để producer call path ở trạng thái comment."
      consumers: ["user sync consumers if producer call path is restored"]
      idempotency_key: "Kafka key would be TenantMessage.messageId UUID; no event is emitted by current active code."

  consumes:
    - name: "TENANT_USER_PROVISION_REQUESTED"
      topic: "AC-DEV-TENANT-USER-PROVISION-REQUESTS"
      source: "tenant user lifecycle request producers"
      handler: "client/kafka/consumer/TenantUserProvisionRequestConsumer.consume -> service/impl/EmployeeServiceImpl.handleTenantUserProvisionRequested"
      implementation_status: "active_in_source"
      meaning: "TenantUserProvisionRequestedEvent — được TenantUserProvisionRequestConsumer consume; EmployeeServiceImpl tạo hoặc reuse IAM user, cập nhật local tenant_user và phát provision result."
      payload_summary: "TenantUserProvisionRequestedEvent kế thừa BaseEvent và gồm tenantId, tenantType, employeeId, employeeCode, email, phone, firstName, lastName, role và branchId."
      effect: "Creates or reuses IAM user, updates local tenant_user IAM/status fields, updates IAM tenant metadata, and publishes TenantUserProvisionedEvent or TenantUserProvisionFailedEvent."
      dedupe_strategy: "No explicit event dedupe table; Kafka manual acknowledgment after service success. Existing-account lookup by phone/tenant type prevents duplicate IAM creation in common paths."

    - name: "TENANT_USER_DISABLE_REQUESTED"
      topic: "AC-DEV-TENANT-USER-DISABLE-REQUESTS"
      source: "tenant user lifecycle request producers"
      handler: "client/kafka/consumer/TenantUserDisableRequestedConsumer.consume -> service/impl/EmployeeServiceImpl.handleTenantUserDisableRequested"
      implementation_status: "active_in_source"
      meaning: "TenantUserDisableRequestedEvent — được TenantUserDisableRequestedConsumer consume; EmployeeServiceImpl deactivate local user, set IAM INACTIVE và phát disabled result."
      payload_summary: "TenantUserDisableRequestedEvent kế thừa BaseEvent và gồm tenantId, employeeId, keycloakUserId và iamUserId."
      effect: "Sets local tenant_user status to INACTIVE, updates IAM protected user status to INACTIVE, and publishes TenantUserDisabledEvent."
      dedupe_strategy: "No explicit event dedupe table; repeated events are effectively status-idempotent for local/IAM INACTIVE update, then can publish duplicate disabled result."

    - name: "TENANT_USER_ENABLE_REQUESTED"
      topic: "AC-DEV-TENANT-USER-ENABLE-REQUESTS"
      source: "tenant user lifecycle request producers"
      handler: "client/kafka/consumer/TenantUserEnableRequestedConsumer.consume -> service/impl/EmployeeServiceImpl.handleTenantUserEnableRequested"
      implementation_status: "active_in_source"
      meaning: "TenantUserEnableRequestedEvent — được TenantUserEnableRequestedConsumer consume; EmployeeServiceImpl activate local user, cập nhật IAM tenant metadata/status và phát enabled result."
      payload_summary: "TenantUserEnableRequestedEvent kế thừa BaseEvent và gồm tenantId, employeeId, keycloakUserId và iamUserId."
      effect: "Sets local tenant_user status to ACTIVE, updates IAM protected user info with tenantId, tenantType, role, status and subdomain, then publishes TenantUserEnabledEvent."
      dedupe_strategy: "No explicit event dedupe table; repeated events are effectively status-idempotent for local/IAM ACTIVE update, then can publish duplicate enabled result."

    - name: "EMPLOYEE_BRANCH_CHANGED"
      topic: "AC-DEV-EMPLOYEE-BRANCH-CHANGED"
      source: "employee lifecycle producers"
      handler: "client/kafka/consumer/EmployeeBranchChangedConsumer.consume -> service/impl/EmployeeServiceImpl.handleEmployeeBranchChanged"
      implementation_status: "active_in_source"
      meaning: "EmployeeBranchChangedEvent — được EmployeeBranchChangedConsumer consume; EmployeeServiceImpl cập nhật branchId trong IAM protected user info."
      payload_summary: "EmployeeBranchChangedEvent kế thừa BaseEvent và gồm tenantId, employeeId, keycloakUserId, iamUserId, oldBranchId và newBranchId."
      effect: "Updates IAM protected user info branchId for the tenant's client type."
      dedupe_strategy: "No explicit event dedupe table; repeated events rewrite the same IAM branchId."

    - name: "EMPLOYEE_ROLE_CHANGED"
      topic: "AC-DEV-EMPLOYEE-ROLE-CHANGED"
      source: "employee lifecycle producers"
      handler: "client/kafka/consumer/EmployeeRoleChangedConsumer.consume -> service/impl/EmployeeServiceImpl.handleEmployeeRoleChanged"
      implementation_status: "active_in_source"
      meaning: "EmployeeRoleChangedEvent — được EmployeeRoleChangedConsumer consume; EmployeeServiceImpl cập nhật role trong IAM protected user info."
      payload_summary: "EmployeeRoleChangedEvent kế thừa BaseEvent và gồm tenantId, employeeId, keycloakUserId, iamUserId, oldRole và newRole."
      effect: "Updates IAM protected user info role for the tenant's client type."
      dedupe_strategy: "No explicit event dedupe table; repeated events rewrite the same IAM role."

    - name: "EMPLOYEE_TERMINATED"
      topic: "AC-DEV-EMPLOYEE-TERMINATED"
      source: "employee lifecycle producers"
      handler: "client/kafka/consumer/EmployeeTerminatedConsumer.consume -> service/impl/EmployeeServiceImpl.handleEmployeeTerminated"
      implementation_status: "active_in_source"
      meaning: "EmployeeTerminatedEvent — được EmployeeTerminatedConsumer consume; EmployeeServiceImpl deactivate local tenant user và set IAM INACTIVE khi không còn active account ở tenant khác."
      payload_summary: "EmployeeTerminatedEvent kế thừa BaseEvent và gồm tenantId, employeeId, keycloakUserId, iamUserId, phone và reason."
      effect: "Deactivates local tenant_user; if there are no active accounts for the same iamUserId in other tenants, sets IAM status INACTIVE and publishes TenantUserDisabledEvent."
      dedupe_strategy: "No explicit event dedupe table; repeated events can republish disabled result, while local/IAM INACTIVE state is effectively idempotent."

    - name: "TENANT_INVOICE_INFO_UPDATED"
      topic: "AC-DEV-TENANT-INVOICE-INFO"
      source: "tenant invoice profile producers"
      handler: "client/kafka/consumer/TenantInvoiceInfoUpdatedConsumer.consume -> service/impl/SaasTenantServiceImpl.handleTenantInvoiceInfoUpdated"
      implementation_status: "active_in_source"
      meaning: "TENANT_INVOICE_PROFILE_EVENTS / TENANT_INVOICE_INFO_UPDATED — được TenantInvoiceInfoUpdatedConsumer consume; SaasTenantServiceImpl merge invoice info và reload tenant cache."
      payload_summary: "TenantMessage payload data là TenantInvoiceInfoPayload gồm tenantId, version, invoiceInfo.companyName, taxCode, companyEmailAddress, companyAddress và updatedBy; consumer chỉ xử lý headers MessageGroup=TENANT_INVOICE_PROFILE_EVENTS và MessageStep=TENANT_INVOICE_INFO_UPDATED."
      effect: "Merges missing tenant invoice fields, validates invoice info, saves TenantInvoiceInfoEntity and reloads tenant cache."
      dedupe_strategy: "No explicit event dedupe table or version guard; repeated events rewrite invoice info and cache with the same payload."

    - name: "TENANT_TRANSPORTER_REGISTRY_CHANGED"
      topic: "AC-DEV-TENANT-TRANSPORTER-REGISTRY-TOPIC"
      source: "tenant transporter registry producers"
      handler: "client/kafka/consumer/TenantTransporterRegistryConsumer.consume -> service/impl/SaasTenantServiceImpl.handleTenantTransporterRegistryUpserted|handleTenantTransporterRegistryDeleted"
      implementation_status: "active_in_source"
      meaning: "TENANT_TRANSPORTER_REGISTRY_UPSERTED / TENANT_TRANSPORTER_REGISTRY_DELETED — được TenantTransporterRegistryConsumer consume; SaasTenantServiceImpl upsert/delete local transporter registry và reload tenant cache."
      payload_summary: "TenantMessage payload data là TenantTransporterRegistryPayload gồm tenantId, copTransporterRegistryId, tenantType, transporterName, routeName, routeContactPhoneNumber, routeStartedAt, shippingAddress, note, status và changeSource; consumer chỉ xử lý MessageGroup=TENANT-TRANSPORTER-REGISTRY và MessageStep thuộc TENANT_TRANSPORTER_REGISTRY_UPSERTED|TENANT_TRANSPORTER_REGISTRY_DELETED."
      effect: "UPSERTED validates and creates/updates local TenantTransporterRegistryEntity, reloads tenant cache, and publishes local upsert requested event for new rows. DELETED removes matching registry by tenantId/copTransporterRegistryId and reloads tenant cache."
      dedupe_strategy: "Upsert resolves by copTransporterRegistryId or routeContactPhoneNumber; delete is idempotent when registry is already missing. No explicit consumed-event dedupe table."

    - name: "BRANCH_OR_WAREHOUSE_CREATED"
      topic: "AC-DEV-BRANCH-LIFECYCLE"
      source: "gf-system / gf-inventory"
      handler: "event/listener/BranchLifecycleEventListener.handleBranchLifecycleEvent -> service/TenantActivationService.saveBranchFromGfSystem|syncWarehouseMasterData"
      implementation_status: "active_in_source_when_feature_enabled"
      meaning: "BRANCH-LIFECYCLE / BRANCH_CREATED.1 / WAREHOUSE_CREATED.1 — được BranchLifecycleEventListener consume khi feature-flag.inventory-stock.enabled và Inventory:InventoryStockV01 bật; TenantActivationService lưu branch hoặc warehouse master data."
      payload_summary: "TenantMessage payload data là BranchCreatedEvent cho BRANCH_CREATED.1 gồm branchId, branchCode, branchName, branchType, status, isDefault, address, city, ward, phone, latitude, longitude, email và taxCode; hoặc WarehouseCreatedEvent cho WAREHOUSE_CREATED.1 gồm warehouseId, warehouseCode, warehouseName, warehouseType, branchId, branchCode, isDefault, isActive, address, city, ward, contactPhone và contactEmail. OriginTenantId header được copy sang payload.tenantId."
      effect: "BRANCH_CREATED.1 saves tenant branch master data. WAREHOUSE_CREATED.1 requires an existing branch by tenantId/branchCode, then saves tenant warehouse master data."
      dedupe_strategy: "Branch and warehouse handlers check existsByTenantIdAndBranchCode or existsByTenantIdAndWarehouseCode before insert; Kafka manual acknowledgment occurs after handler returns."

workflows:
  - name: "TenantActivationStatusProbeJob"
    type: "CRON_HTTP_JOB"
    description: "External cron/cp-bpm-worker driven HTTP job that finalizes tenant activation or deactivation by probing runtime tenant domains. No Spring @Scheduled or Temporal workflow is declared in this repo; schedule and retry policy are owned by the external caller."
    steps:
      - step: 1
        service: "cp-bpm-worker / external scheduler"
        action: "Triggered by cp-bpm-worker cron HTTP schedule external to this repo -> POST /protected/v1/saas-tenant/update-tenant-status"
      - step: 2
        service: "ct-saas-tenant"
        action: "SaasInternalTenantController#updateTenantStatus delegates to SaasTenantServiceImpl#updateTenantStatus."
      - step: 3
        service: "ct-saas-tenant"
        action: "Scan first page of Tenant records with status in [ACTIVATING, DEACTIVATING], ordered by updatedAt ascending."
      - step: 4
        service: "ct-saas-tenant"
        action: "Build tenant runtime domain as https://{subdomain}.{garage-host|vendor-host} based on Tenant.type and probe it with RestClient."
      - step: 5
        service: "ct-saas-tenant"
        action: "When status=ACTIVATING and the domain is reachable, set stage=ACTIVE and status=ACTIVATED, then publish sync-to-accounting if enabled."
      - step: 6
        service: "ct-saas-tenant"
        action: "When status=DEACTIVATING and the domain is unreachable, set stage=INACTIVE and status=DEACTIVATED, then publish sync-to-accounting if enabled."
      - step: 7
        service: "ct-saas-tenant"
        action: "Persist all tenants whose lifecycle state reached a terminal activated/deactivated state in this run."

  - name: "TenantUserRoleGroupMigrationBatch"
    type: "CRON_BATCH_PROCESSOR"
    description: "External tick/manual migration batch that maps SaaS tenant_user.roleCode to PMS Policy Master groupId and updates IAM custom groupRoles. The processor is exposed as protected HTTP and has no Spring @Scheduled trigger in the current source."
    steps:
      - step: 1
        service: "cp-bpm-worker / migration operator"
        action: "Triggered by cp-bpm-worker cron HTTP or manual migration call external to this repo -> POST /protected/v1/migration/tenant-users/{batchSize} with optional force flag and optional userIds body."
      - step: 2
        service: "ct-saas-tenant"
        action: "TenantUserMigrationController#migrateTenantUser loads all policy groups from cp-pms-policy-master and builds roleCode -> groupId mapping; CA is mapped to ORG_ACCOUNTANT."
      - step: 3
        service: "ct-saas-tenant"
        action: "Select TenantUser records by explicit userIds, or by groupId IS NULL limited to batchSize, or all users limited to batchSize when force=true."
      - step: 4
        service: "ct-saas-tenant"
        action: "Load Tenant records for selected users to derive IAM ClientType from Tenant.type."
      - step: 5
        service: "ct-saas-tenant"
        action: "For each selected user, update local tenant_user.groupId when roleCode maps to a policy group."
      - step: 6
        service: "sec-iam-service"
        action: "Call IamClient#updateGroupRoles for users with iamUserId, passing clientType and groupRoles=[groupId]."
      - step: 7
        service: "ct-saas-tenant"
        action: "Return total, batchSize, failedCount, succeedCount, failedIds and per-user success/error details so the caller can rerun failed batches."

  - name: "DefaultBranchMigrationAsyncProcessor"
    type: "CRON_BATCH_PROCESSOR"
    description: "Async batch worker for one-time migration of default branches for existing tenants. It runs on migrationTaskExecutor with a single worker thread and an in-memory concurrency guard; current source contains the worker but no controller, @Scheduled method, or WorkflowClient caller."
    steps:
      - step: 1
        service: "ct-saas-tenant"
        action: "Triggered by internal call TenantBranchMigrationService#migrateDefaultBranchesAsync; current source has no exposed scheduler/controller trigger for this worker."
      - step: 2
        service: "ct-saas-tenant"
        action: "Reject concurrent execution with migrationInProgress AtomicBoolean; process batches sequentially with BATCH_SIZE=50 on migrationTaskExecutor."
      - step: 3
        service: "ct-saas-tenant"
        action: "Find tenants with city IS NOT NULL, stage in [OPEN, ACTIVE, INACTIVE], and no existing branch."
      - step: 4
        service: "ct-saas-tenant"
        action: "For each tenant, call processTenantInTransaction using REQUIRES_NEW transaction boundaries."
      - step: 5
        service: "ct-saas-tenant"
        action: "Reuse SaasTenantService#createDefaultBranchAndWarehouse to publish TENANT-PROVISIONING / TENANT_PROVISIONED.1 when Inventory:InventoryStockV01 is enabled and the tenant still has no branch."
      - step: 6
        service: "ct-saas-tenant"
        action: "Continue after per-tenant failures, aggregate success/failure counts, sleep 1000 ms between pages, and clear migrationInProgress in finally."

entities:
  - name: "Tenant"
    type: "aggregate_root"
    description: "Hồ sơ chính và gốc vòng đời của tenant."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "code", type: "VARCHAR", required: true, constrains: ["generated_from_type_and_id", "unique_business_code"]}
      - {name: "name", type: "VARCHAR", required: true, constrains: ["not_blank", "trimmed"]}
      - {name: "type", type: "TenantType", required: true, constrains: ["enum: VENDOR, GARAGE"]}
      - {name: "subdomain", type: "VARCHAR", required: true, constrains: ["unique", "not_blank", "max_length: 20", "immutable_or_controlled_change"]}
      - {name: "logoUrl", type: "VARCHAR", required: false, constrains: []}
      - {name: "representativeName", type: "VARCHAR", required: true, constrains: ["not_blank"]}
      - {name: "chiefAccountantName", type: "VARCHAR", required: false, constrains: ["trimmed"]}
      - {name: "companyPhoneNumber", type: "VARCHAR", required: true, constrains: ["unique", "not_blank", "trimmed"]}
      - {name: "companyEmailAddress", type: "VARCHAR", required: false, constrains: ["valid_email_if_present", "trimmed"]}
      - {name: "headOfficeAddress", type: "VARCHAR", required: false, constrains: ["required_when_feature_enabled: Inventory:InventoryStockV01"]}
      - {name: "cityCode", type: "VARCHAR", required: false, constrains: ["required_when_feature_enabled: Inventory:InventoryStockV01"]}
      - {name: "wardCode", type: "VARCHAR", required: false, constrains: ["required_when_feature_enabled: Inventory:InventoryStockV01"]}
      - {name: "stage", type: "ENUM", required: true, constrains: ["enum: PROCUREMENT, PROVISIONED, OPEN, ACTIVE, INACTIVE, LOCKED, DELETED"]}
      - {name: "status", type: "ENUM", required: true, constrains: ["enum: PROVISIONING, PROVISIONED, ACTIVATING, ACTIVATED, DEACTIVATING, DEACTIVATED, OFFBOARDING, OFFBOARDED"]}
      - {name: "tcConfirmed", type: "BOOLEAN", required: true, constrains: ["default: false"]}
      - {name: "dataPrivacyConfirmed", type: "BOOLEAN", required: true, constrains: ["default: false"]}
      - {name: "ecommerceConfirmed", type: "BOOLEAN", required: true, constrains: ["default: false"]}
      - {name: "opsNote", type: "VARCHAR", required: false, constrains: []}
      - {name: "ops1", type: "VARCHAR", required: false, constrains: []}
      - {name: "ops2", type: "VARCHAR", required: false, constrains: []}
      - {name: "ops3", type: "VARCHAR", required: false, constrains: []}
      - {name: "ops4", type: "VARCHAR", required: false, constrains: []}
      - {name: "ops5", type: "VARCHAR", required: false, constrains: []}
    relationships:
      - {target: "TenantOperationArea", type: "one_to_many", description: "Tenant sở hữu danh sách khu vực hoạt động; bắt buộc khi onboarding và được dùng khi activation/IAM provisioning."}
      - {target: "TenantSubscription", type: "one_to_many", description: "Tenant có các đăng ký gói dịch vụ; hiện tại luồng xử lý kỳ vọng một subscription chính, nhưng mô hình có thể hỗ trợ lịch sử đăng ký."}
      - {target: "TenantInvoiceInfo", type: "one_to_many", description: "Tenant sở hữu thông tin xuất hóa đơn; hiện tại implementation xử lý như một bản ghi invoice-info hiện hành."}
      - {target: "TenantBusinessModel", type: "one_to_many", description: "Tenant sở hữu cấu hình mô hình kinh doanh; hiện tại implementation xử lý như một business model hiện hành."}
      - {target: "TenantStageTransitionHistory", type: "one_to_many", description: "Tenant có lịch sử chuyển trạng thái vòng đời; đây là audit append-only, không phải child entity chứa business behavior."}
      - {target: "TenantUser", type: "one_to_many", description: "Tenant có thể có nhiều user, nhưng TenantUser nên là aggregate riêng được tham chiếu bằng tenantId vì vòng đời IAM/employee có rule độc lập."}
      - {target: "TenantBranch", type: "one_to_many", description: "Tenant có thể có nhiều chi nhánh, nhưng dữ liệu branch được đồng bộ từ branch lifecycle event bên ngoài; nên xem là aggregate/projection riêng."}
      - {target: "TenantWarehouse", type: "one_to_many", description: "Tenant có thể có nhiều kho, nhưng dữ liệu warehouse được đồng bộ từ inventory event; nên xem là aggregate/projection riêng."}
      - {target: "TenantVehicleProfile", type: "one_to_many", description: "Tenant có thể có nhiều cấu hình hồ sơ xe; nên tách thành aggregate cấu hình riêng và tham chiếu bằng tenantId."}
      - {target: "TenantTransporterRegistry", type: "one_to_many", description: "Tenant có thể có nhiều đăng ký tuyến vận chuyển; entity này có rule riêng về unique phone/status nên nên tách aggregate riêng nếu behavior tiếp tục mở rộng."}
      - {target: "ConsultantAssignment", type: "one_to_many", description: "Tenant có lịch sử phân công consultant; với GARAGE tenant và feature quotation consultant, chỉ được có một assignment ACTIVE tại một thời điểm."}
    invariants:
      - "Onboarding yêu cầu notnull: name, type, tenantBusinessModel, subdomain, saasTier, saasSolution, companyPhoneNumber, representativeName và operationAreaCodes."
      - "Khi onboarding, subdomain phải không rỗng, không vượt quá 20 ký tự và duy nhất; service kiểm tra bằng pessimistic lock theo subdomain."
      - "Khi onboarding, companyPhoneNumber phải không rỗng, được trim và duy nhất; service kiểm tra bằng pessimistic lock theo phone number."
      - "Nếu feature Inventory:InventoryStockV01 bật, Tenant phải có city, ward, headOfficeAddress và companyPhoneNumber trước khi onboarding/provisioning default branch."
      - "Nếu feature Purchase:PurchaseV02 bật và Tenant type là GARAGE, invoiceCompanyName, taxCode và invoiceCompanyAddress là bắt buộc ngay trong onboarding và trước khi complete Tenant."
      - "Invoice email nếu có thì phải đúng định dạng email."
      - "Nếu feature Marketplace:QuotationConsultant bật và Tenant type là GARAGE, onboarding yêu cầu consultantId và consultantId phải là active consultant resolve được từ HRMS; sau onboarding phải có consultant assignment ACTIVE."
      - "Tenant mới được onboarding sẽ bắt đầu với stage=PROVISIONED và status=PROVISIONED; các confirmation flags mặc định là false."
      - "Tenant code được sinh sau khi có id, theo tenant type và prefix đặc biệt của QC/virtual subdomain nếu có."
      - "Sau onboarding thành công, Tenant phải có các dữ liệu phụ trợ tối thiểu trong cùng transaction: stage transition history ban đầu, operation areas, tiering solution, subscription, invoice info và business model."
      - "Thông tin cơ bản của Tenant chỉ được cập nhật khi stage thuộc PROCUREMENT, PROVISIONED hoặc OPEN."
      - "Tenant chỉ được complete khi đang ở stage=PROVISIONED; sau complete sẽ chuyển sang stage=OPEN và status=ACTIVATING."
      - "Tenant chỉ được toggle active/inactive khi stage hiện tại là ACTIVE hoặc INACTIVE."
      - "Khi deactivate Tenant phải có reason, và reason không được vượt quá 255 ký tự."
      - "Tenant được xem là activated chỉ khi stage=ACTIVE và status=ACTIVATED."
      - "Khi status=ACTIVATING và subdomain đã active, Tenant chuyển sang stage=ACTIVE và status=ACTIVATED; khi status=DEACTIVATING và subdomain không còn active, Tenant chuyển sang stage=INACTIVE và status=DEACTIVATED."
      - "TC/DataPrivacy/Ecommerce confirmation là trạng thái một chiều; code hiện tại chỉ set từ false sang true, không có command unset."
      - "Nếu feature QuotationConsultant bật và Tenant type là GARAGE, Tenant phải có consultant assignment ACTIVE trước khi complete/reactivate."
  - name: "TenantUser"
    type: "aggregate_root"
    description: "Tài khoản người dùng thuộc SaaS tenant, quản lý IAM provisioning và employee lifecycle độc lập với Tenant."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "tenantId", type: "BIGINT", required: true, constrains: ["references: Tenant.id", "aggregate_reference", "no_jpa_foreign_key_mapping"]}
      - {name: "tenantSubscriptionId", type: "BIGINT", required: false, constrains: ["references: TenantSubscription.id", "set_on_manual_create", "nullable_for_employee_provisioning"]}
      - {name: "userName", type: "VARCHAR", required: false, constrains: ["derived_from_phoneNumber_on_current_create_flows"]}
      - {name: "fullName", type: "VARCHAR", required: true, constrains: ["not_blank_on_manual_create", "column_not_null", "employee_flow_uses_firstName_plus_lastName"]}
      - {name: "phoneNumber", type: "VARCHAR", required: true, constrains: ["not_blank_on_manual_create", "used_as_username", "global_unique_on_manual_create", "tenant_type_phone_identity_for_employee_provisioning"]}
      - {name: "emailAddress", type: "Email", required: false, constrains: ["valid_email_if_present_on_manual_create"]}
      - {name: "roleCode", type: "VARCHAR", required: true, constrains: ["required_for_iam_provisioning", "GARAGE: GARAGE_OWNER or CA", "VENDOR: VENDOR_OWNER or EXPRESS_EMPLOYEE"]}
      - {name: "avatarUrl", type: "Url", required: false, constrains: []}
      - {name: "iamUserId", type: "VARCHAR", required: false, constrains: ["assigned_by_iam", "required_when_iamCreationStatus_is_SUCCEED"]}
      - {name: "temporaryPassword", type: "VARCHAR", required: false, constrains: ["assigned_by_iam_on_create", "sensitive"]}
      - {name: "roleId", type: "BIGINT", required: false, constrains: ["currently_not_used_by_main_saas_flow"]}
      - {name: "iamCreationStatus", type: "IamCreationStatus", required: false, constrains: ["enum: PENDING, SUCCEED, FAILED", "SUCCEED_on_iam_create_success", "FAILED_on_iam_create_failure"]}
      - {name: "status", type: "SaasUserStatus", required: true, constrains: ["enum: ACTIVE, INACTIVE", "column_not_null", "ACTIVE_on_iam_success_or_enable", "INACTIVE_on_disable_or_terminate"]}
      - {name: "expressTenantCode", type: "VARCHAR", required: false, constrains: ["generated_when_roleCode_is_EXPRESS_EMPLOYEE", "format: {tenantCode}-EX-{tenantUserId}"]}
      - {name: "groupId", type: "VARCHAR", required: false, constrains: ["PMS_policy_group_id", "migration_maps_from_roleCode", "used_for_iam_groupRoles"]}
    relationships:
      - {target: "Tenant", type: "many_to_one_by_id", description: "TenantUser thuộc một Tenant qua tenantId; không có JPA association, repository join thủ công với Tenant khi cần tenant type/subdomain."}
      - {target: "TenantSubscription", type: "many_to_one_optional_by_id", description: "Manual create gán tenantSubscriptionId từ subscription hiện hành; employee provisioning có thể tạo TenantUser không có tenantSubscriptionId."}
      - {target: "TenantOperationArea", type: "read_dependency", description: "IAM provisioning lấy operation area codes của Tenant làm regions cho IAM user."}
      - {target: "IAMUser", type: "external_identity", description: "iamUserId là identity bên IAM; cùng một iamUserId có thể xuất hiện ở nhiều TenantUser records, nhưng lifecycle flow kỳ vọng chỉ một record ACTIVE tại một thời điểm."}
      - {target: "PolicyGroup", type: "external_reference", description: "groupId trỏ tới PMS Policy Master group; hiện được migrate từ roleCode rồi update IAM groupRoles."}
      - {target: "TenantUserLifecycleKafkaEvents", type: "publishes_and_consumes", description: "Consume provision/enable/disable/employee lifecycle events; publish created/provisioned/enabled/disabled/failed result events."}
    invariants:
      - "Manual create yêu cầu Tenant tồn tại, TenantSubscription tồn tại, fullName và phoneNumber không rỗng."
      - "Manual create chỉ dành cho system-admin roles trong roleViewTenant; nếu không có quyền thì service trả 0L thay vì tạo user."
      - "Manual create kiểm tra phoneNumber unique toàn hệ thống bằng existsByPhoneNumber; employee provisioning kiểm tra theo tenant type + phone."
      - "Email chỉ được validate format trong manual create khi có giá trị; employee provisioning nhận email từ event và không validate tại aggregate này."
      - "Nếu role request rỗng hoặc OWNER: GARAGE map thành GARAGE_OWNER, VENDOR map thành VENDOR_OWNER; GARAGE chỉ cho thêm CA, VENDOR chỉ cho thêm EXPRESS_EMPLOYEE."
      - "EXPRESS_EMPLOYEE được gán expressTenantCode sau khi có id, theo format tenantCode-EX-userId."
      - "Manual create đang block khi existingUserCount > limitUser; config mặc định limit-user=1, nhưng điều kiện code hiện tại vẫn cho phép count == limitUser."
      - "Khi tenant đã ACTIVATED hoặc ACTIVATING, manual create trigger IAM ngay; activation/reactivation xử lý các user chưa có iamUserId; retry IAM xử lý user có iamCreationStatus=FAILED."
      - "IAM create thành công set iamUserId, temporaryPassword, iamCreationStatus=SUCCEED, status=ACTIVE, publish TenantUserCreatedEvent và tạo conversation user; thất bại set iamCreationStatus=FAILED."
      - "Internal getTenantUsersByTenantId chỉ trả users có iamCreationStatus=SUCCEED và status=ACTIVE, có thể lọc thêm roleCode."
      - "TenantUserProvisionRequestedEvent fail nếu cùng tenant type + phone đang có account ACTIVE; nếu reuse iamUserId thì inactive các record cùng phone ở tenant khác rồi activate record hiện tại."
      - "Enable request không activate nếu cùng iamUserId đã ACTIVE ở bất kỳ tenant nào; disable/terminate set local status=INACTIVE và publish TenantUserDisabledEvent."
      - "Employee branch/role changed events chỉ update IAM user info; code hiện tại không mutate local TenantUser roleCode hay branch field."
      - "groupId không được set trong main create/provision flow; migration controller map roleCode sang PMS group id và update IAM groupRoles."
  - name: "TenantBranch"
    type: "aggregate_root"
    description: "Master/projection dữ liệu chi nhánh của SaaS tenant trong Control Plane; được đồng bộ từ branch lifecycle event sau khi tenant provisioning yêu cầu hệ thống ngoài tạo branch/warehouse."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "tenantId", type: "BIGINT", required: true, constrains: ["references: Tenant.id", "no_jpa_foreign_key_mapping"]}
      - {name: "branchCode", type: "VARCHAR", required: true, constrains: ["business_key", "unique_within_tenant", "max_length: 50", "upstream_generated"]}
      - {name: "branchName", type: "VARCHAR", required: true, constrains: ["not_blank", "max_length: 255"]}
      - {name: "branchType", type: "VARCHAR", required: true, constrains: ["expected: GARAGE, VENDOR", "max_length: 50"]}
      - {name: "address", type: "TEXT", required: false, constrains: ["required_for_default_provisioning_when_feature_enabled: Inventory:InventoryStockV01"]}
      - {name: "city", type: "VARCHAR", required: false, constrains: ["mdm_location_code", "max_length: 100", "required_for_default_provisioning_when_feature_enabled: Inventory:InventoryStockV01"]}
      - {name: "ward", type: "VARCHAR", required: false, constrains: ["mdm_location_code", "max_length: 100"]}
      - {name: "longitude", type: "DECIMAL(11,8)", required: false, constrains: []}
      - {name: "latitude", type: "DECIMAL(11,8)", required: false, constrains: []}
      - {name: "phone", type: "VARCHAR", required: false, constrains: ["max_length: 20", "required_for_default_provisioning_when_feature_enabled: Inventory:InventoryStockV01"]}
      - {name: "email", type: "Email", required: false, constrains: ["max_length: 255"]}
      - {name: "taxCode", type: "VARCHAR", required: false, constrains: ["max_length: 50"]}
      - {name: "status", type: "BranchStatus", required: true, constrains: ["enum: DRAFT, PENDING_APPROVAL, ACTIVE, SUSPENDED, INACTIVE, CANCELLED", "default: ACTIVE"]}
      - {name: "isDefault", type: "BOOLEAN", required: true, constrains: ["default: false"]}
      - {name: "metadata", type: "JSON", required: false, constrains: []}
    relationships:
      - {target: "Tenant", type: "many_to_one_by_id", description: "TenantBranch thuộc một Tenant qua tenantId; implementation không khai báo JPA relation, chỉ dùng tenantId làm reference."}
      - {target: "TenantWarehouse", type: "one_to_many_by_code", description: "Warehouse liên kết logic với branch bằng cặp tenantId + branchCode; warehouse sync yêu cầu branch đã tồn tại trước."}
      - {target: "BranchCreatedEvent", type: "created_from_event", description: "Bản ghi local được tạo khi nhận BRANCH_LIFECYCLE / BRANCH_CREATED từ gf-system."}
    invariants:
      - "Mỗi TenantBranch phải có tenantId, branchCode, branchName, branchType và status."
      - "Trong phạm vi một Tenant, branchCode là business key duy nhất: unique(tenant_id, branch_code)."
      - "Branch master data được ghi idempotent từ BranchCreatedEvent; nếu tenantId + branchCode đã tồn tại thì bỏ qua, không update."
      - "Default branch/warehouse provisioning chỉ chạy khi feature Inventory:InventoryStockV01 bật; nếu tenant đã có bất kỳ branch nào thì createDefaultBranchAndWarehouse bỏ qua."
      - "Khi publish TenantProvisionedEvent để tạo default branch, service yêu cầu tenant có city, address và phone nếu feature Inventory:InventoryStockV01 bật."
      - "BranchLifecycleEvent chỉ xử lý MessageGroup=BRANCH_LIFECYCLE với MessageStep=BRANCH_CREATED hoặc WAREHOUSE_CREATED."
      - "WarehouseCreatedEvent không tạo branch; nếu chưa tìm thấy branch theo tenantId + branchCode thì service throw BusinessException để retry."
      - "API đọc default branch kỳ vọng tenant có ít nhất một branch với isDefault=true; code hiện tại chọn bản ghi đầu tiên và chưa enforce duy nhất ở DB."
      - "Tenant basic response chỉ trả branch ACTIVE; default-branch endpoint đọc tất cả branch rồi lọc isDefault."
  - name: "TenantWarehouse"
    type: "aggregate_root"
    description: "Projection/master data kho của Tenant trong Control Plane, được đồng bộ từ warehouse lifecycle event bên ngoài thay vì được tạo trực tiếp như child entity của Tenant."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "tenantId", type: "BIGINT", required: true, constrains: ["references: Tenant.id", "no_jpa_foreign_key_mapping"]}
      - {name: "branchCode", type: "VARCHAR", required: true, constrains: ["max_length: 50", "references_tenant_branch_by_code"]}
      - {name: "warehouseCode", type: "VARCHAR", required: true, constrains: ["max_length: 50", "unique_per_tenant", "immutable_after_created"]}
      - {name: "warehouseName", type: "VARCHAR", required: true, constrains: ["max_length: 255"]}
      - {name: "warehouseType", type: "WarehouseTypeEnum", required: true, constrains: ["enum: MAIN, BRANCH, EXTERNAL"]}
      - {name: "address", type: "TEXT", required: false, constrains: []}
      - {name: "city", type: "VARCHAR", required: false, constrains: ["max_length: 100", "mdm_location_code"]}
      - {name: "ward", type: "VARCHAR", required: false, constrains: ["max_length: 100", "mdm_location_code"]}
      - {name: "contactPhone", type: "VARCHAR", required: false, constrains: ["max_length: 20"]}
      - {name: "contactEmail", type: "Email", required: false, constrains: ["max_length: 255"]}
      - {name: "isDefault", type: "BOOLEAN", required: true, constrains: ["default: false", "event_value_required"]}
      - {name: "isActive", type: "BOOLEAN", required: true, constrains: ["default: true", "event_value_required"]}
    relationships:
      - {target: "Tenant", type: "many_to_one_by_id", description: "TenantWarehouse thuộc về một Tenant qua tenantId; Tenant chỉ tham chiếu như danh sách projection/aggregate riêng."}
      - {target: "TenantBranch", type: "many_to_one_by_code", description: "TenantWarehouse gắn với branch bằng cặp tenantId + branchCode; entity/migration hiện không lưu branchId và không khai báo JPA foreign key."}
      - {target: "WarehouseCreatedEvent", type: "created_from_event", description: "Bản ghi local được tạo khi nhận BRANCH_LIFECYCLE / WAREHOUSE_CREATED từ gf-inventory; duplicate theo tenantId + warehouseCode sẽ bị skip."}
    invariants:
      - "Mỗi TenantWarehouse phải có tenantId, branchCode, warehouseCode, warehouseName, warehouseType, isDefault và isActive."
      - "Trong cùng một Tenant, warehouseCode là duy nhất theo constraint uk_warehouse trên tenantId + warehouseCode."
      - "Warehouse chỉ được sync khi TenantBranch tương ứng với tenantId + branchCode đã tồn tại; nếu branch chưa có, service throw exception để retry sau."
      - "Luồng SaaS hiện không tạo TenantWarehouse trực tiếp khi complete Tenant; nó publish TenantProvisionedEvent, rồi chờ WarehouseCreatedEvent từ downstream."
      - "WarehouseCreatedEvent trùng tenantId + warehouseCode là idempotent no-op; code hiện tại không merge/update dữ liệu warehouse đã tồn tại."
      - "warehouseType phải map chính xác vào WarehouseTypeEnum bằng valueOf; giá trị ngoài MAIN/BRANCH/EXTERNAL sẽ làm xử lý event fail."
      - "isDefault và isActive phải được upstream event cung cấp non-null trong sync path; builder default không bảo vệ được khi code set trực tiếp giá trị null từ event."
      - "API default warehouse kỳ vọng Tenant tồn tại, có ít nhất một warehouse, và có warehouse isDefault=true; nếu không sẽ throw BusinessException."
      - "Default warehouse trong default branch response chỉ được gắn khi warehouse có isDefault=true và branchCode trùng default branch."
      - "Tổng số warehouse hiển thị ở tenant detail chỉ tính warehouse có isActive=true."
      - "Provisioning/sync default branch và warehouse bị gate bởi feature Inventory:InventoryStockV01 / feature-flag.inventory-stock."
  - name: "TenantVehicleProfile"
    type: "aggregate_root"
    description: "Cấu hình phạm vi hãng/mẫu/năm/phiên bản xe mà một SaaS tenant hỗ trợ; dùng cho tìm kiếm vendor/vehicle tenant và được resolve/verify qua catalog MDM."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "tenantId", type: "BIGINT", required: true, constrains: ["references: Tenant.id", "not_null", "no_jpa_foreign_key_mapping"]}
      - {name: "brandCode", type: "VARCHAR", required: true, constrains: ["mdm_catalog_code: CAR_BRAND", "not_blank_in_edit_request", "wildcard_allowed: *"]}
      - {name: "modelCode", type: "TEXT", required: false, constrains: ["mdm_catalog_code: CAR_MODEL", "required_for_specific_vehicle_profile", "nullable_when_all_brand_wildcard"]}
      - {name: "trimsLevelCode", type: "VARCHAR", required: false, constrains: ["mdm_catalog_code: TRIMS_LEVEL", "must_match_year_when_present_in_import_verify"]}
      - {name: "yearOfManufactureCode", type: "VARCHAR", required: false, constrains: ["mdm_catalog_code: YEAR_OF_MANUFACTURE", "required_for_valid_import", "must_match_model_in_import_verify"]}
      - {name: "typeCode", type: "VARCHAR", required: false, constrains: ["stored_and_returned_only", "not_populated_by_current_edit/import_flows"]}
    relationships:
      - {target: "Tenant", type: "many_to_one_by_id", description: "TenantVehicleProfile thuộc một Tenant qua tenantId; code không khai báo JPA association, chỉ lưu khóa tham chiếu."}
      - {target: "EcommerceMdmCatalog", type: "external_reference", description: "brand/model/year/trim codes được resolve hoặc verify qua protected catalog APIs của Ecommerce MDM."}
    invariants:
      - "Mỗi TenantVehicleProfile phải thuộc một Tenant đang tồn tại khi edit qua SaaS flow; tenant không tồn tại làm service throw BusinessException."
      - "Search API yêu cầu tenantId, nhưng specification hiện tại chỉ filter theo tenantId; các field brandCode/modelCode/trimsLevelCode/yearOfManufactureCode/typeCode trong search request chưa được áp dụng."
      - "Edit command có thể xóa theo danh sách id hoặc xóa toàn bộ profile của tenant theo brandCode; delete by id hiện không kiểm tra id có thuộc tenantId trong request hay không."
      - "Khi thêm bằng edit command, brandCode bắt buộc không blank; modelCodes đã tồn tại trong cùng tenantId + brandCode được lọc ra trước khi gọi MDM."
      - "Profile thêm bằng edit command được resolve từ Ecommerce MDM; nếu MDM không trả data thì service throw BusinessException."
      - "Không có unique constraint ở entity/repository; duplicate prevention hiện nằm ở service edit flow theo tenantId + brandCode + modelCode và không bao phủ batch import."
      - "Import verify chuẩn hóa tên thành mã dạng <DIRECTORY>_<NORMALIZED_NAME> và chỉ valid khi brand tồn tại, model thuộc brand, year thuộc model, và trim nếu có thì thuộc year."
      - "Import chỉ persist các dòng request có isValid=true; dữ liệu lưu là mã đã generate cho CAR_BRAND, CAR_MODEL, YEAR_OF_MANUFACTURE và TRIMS_LEVEL."
      - "Command addAllVehicle thay thế toàn bộ profile của tenant bằng một profile wildcard có brandCode='*' và model/year/trim/type để null."
      - "Read model searchVehicleTenant nhóm profile theo brandCode và modelCode; các dòng null brand/model bị loại khỏi projection grouping."
  - name: "TenantTransporterRegistry"
    type: "aggregate_root"
    description: "Đăng ký nhà vận chuyển/tuyến giao hàng của một SaaS tenant, dùng cho quản trị tuyến, import dữ liệu và đồng bộ Kafka với hệ thống transporter registry bên ngoài."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "tenantId", type: "BIGINT", required: true, constrains: ["references: Tenant.id", "no_jpa_foreign_key_mapping"]}
      - {name: "tenantType", type: "TenantType", required: true, constrains: ["derived_from_tenant.type", "stored_as_string"]}
      - {name: "transporterName", type: "VARCHAR", required: true, constrains: ["not_blank"]}
      - {name: "routeName", type: "VARCHAR", required: true, constrains: ["not_blank"]}
      - {name: "routeContactPhoneNumber", type: "VARCHAR", required: true, constrains: ["not_blank", "unique_per_tenant_in_create_upsert_and_import_verify"]}
      - {name: "routeStartedAt", type: "TEXT", required: true, constrains: ["not_blank", "stored_as_text"]}
      - {name: "shippingAddress", type: "VARCHAR", required: true, constrains: ["not_blank_on_create_and_kafka_upsert"]}
      - {name: "note", type: "TEXT", required: false, constrains: []}
      - {name: "status", type: "ENUM", required: true, constrains: ["enum: ACTIVE, INACTIVE", "default: ACTIVE", "not_null"]}
    relationships:
      - {target: "Tenant", type: "many_to_one_by_id", description: "Mỗi registry thuộc một Tenant qua tenantId; Tenant có thể có nhiều registry và tenantType được lấy từ Tenant.type khi lưu."}
      - {target: "TenantTransporterRegistryCreatedEvent", type: "domain_event", description: "Sau create/import/new upsert, service publish event chứa danh sách registry đã lưu."}
      - {target: "TenantTransporterRegistryKafkaEvents", type: "publishes_and_consumes", description: "Listener publish upsert-requested sau commit; consumer nhận upserted/deleted để upsert hoặc xóa dữ liệu local."}
    invariants:
      - "TenantTransporterRegistry chỉ được tạo/cập nhật/xóa khi Tenant tương ứng tồn tại."
      - "Registry mới từ direct create, bulk edit add, import hoặc Kafka upsert mới mặc định status=ACTIVE."
      - "Status hợp lệ chỉ gồm ACTIVE hoặc INACTIVE; status từ Kafka được trim/uppercase trước khi parse, giá trị sai bị reject."
      - "Create request và Kafka upsert bắt buộc transporterName, routeName, routeContactPhoneNumber, routeStartedAt và shippingAddress không rỗng; note là optional."
      - "routeContactPhoneNumber là natural lookup key trong phạm vi tenant khi payload không có copTransporterRegistryId."
      - "Duplicate routeContactPhoneNumber trong cùng tenant bị chặn ở direct create, Kafka upsert và verify import; DB hiện không có unique constraint và bulk edit hiện không re-check rule này."
      - "Kafka upsert có copTransporterRegistryId thì chỉ update registry khớp tenantId + id; không có id thì tìm theo tenantId + routeContactPhoneNumber hoặc tạo mới."
      - "Kafka delete cần tenantId và copTransporterRegistryId; nếu thiếu thì bỏ qua, nếu tìm thấy thì hard delete registry."
      - "Search registry luôn tenant-scoped, có thể filter theo status và criteria trên transporterName, routeContactPhoneNumber, routeName."
  - name: "ConsultantAssignment"
    type: "aggregate_root"
    description: "Lịch sử phân công quotation consultant cho SaaS tenant; dùng để xác định consultant ACTIVE hiện hành của GARAGE tenant khi feature Marketplace:QuotationConsultant bật."
    attributes:
      - {name: "id", type: "BIGINT", required: true, constrains: ["generated", "immutable_after_created"]}
      - {name: "tenantId", type: "BIGINT", required: true, constrains: ["immutable_after_created", "must_reference_existing_tenant", "no_jpa_foreign_key_mapping"]}
      - {name: "consultantId", type: "BIGINT", required: true, constrains: ["immutable_after_created", "must_reference_active_hrms_consultant"]}
      - {name: "status", type: "ConsultantAssignmentStatus", required: true, constrains: ["enum: ACTIVE, INACTIVE", "default: ACTIVE"]}
    relationships:
      - {target: "Tenant", type: "many_to_one_by_id", description: "Assignment thuộc về một SaaS tenant qua tenantId; Tenant giữ lịch sử nhiều assignment nhưng service chỉ dùng assignment ACTIVE làm consultant hiện hành."}
      - {target: "EmployeeConsultant", type: "external_reference", description: "consultantId trỏ tới consultant employee bên CP ERP HRMS; service validate qua protected employee consultant API trước khi tạo/reactivate assignment."}
    invariants:
      - "Assignment chỉ được tạo/reactivate cho Tenant tồn tại; nếu tenantId không tồn tại thì command fail."
      - "Assignment cho Tenant type VENDOR bị bỏ qua; rule nghiệp vụ hiện hành chỉ có ý nghĩa với GARAGE tenant."
      - "Khi feature Marketplace:QuotationConsultant bật, GARAGE tenant onboarding/update phải có consultantId không null và consultant đó phải tồn tại trong danh sách active consultant từ HRMS."
      - "Khi feature Marketplace:QuotationConsultant bật, GARAGE tenant chỉ được complete/reactivate nếu có ít nhất một ConsultantAssignment ACTIVE."
      - "Tại service layer, mỗi tenant chỉ nên có một ConsultantAssignment ACTIVE tại một thời điểm; khi tạo assignment mới hoặc reactivate assignment cũ, các assignment ACTIVE khác của cùng tenant bị chuyển sang INACTIVE."
      - "Nếu assignment cùng tenantId và consultantId đã ACTIVE, command assign là idempotent và không tạo bản ghi mới."
      - "Nếu assignment cùng tenantId và consultantId đã INACTIVE, command assign reactivate bản ghi đó thay vì tạo bản ghi mới."
      - "Bulk assignment request không được lặp consultantId và không được lặp tenantId giữa các assignment item."
      - "Read model/API chỉ trả về assignment ACTIVE khi lấy consultant theo tenant hoặc khi expose consultantId trong tenant response/search."

business_rules:
  - { id: "BR-CT-SAAS-TENANT-001", description: "Luồng SaaS là source of truth cho tenant hiện hành; code deprecated dưới model/entity legacy không nên dùng cho behavior mới trừ khi task nhắm thẳng vào legacy.", cornerstone: true, enforcement_point: "SaasTenantController + SaasTenantServiceImpl + model.entity.saas.*" }
  - { id: "BR-CT-SAAS-TENANT-002", description: "Onboarding SaaS tenant chỉ cho các role trong roleViewTenant; caller không thuộc nhóm này không tạo tenant và service trả 0L.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#onboardSaasTenant + roleViewTenant" }
  - { id: "BR-CT-SAAS-TENANT-003", description: "Khi onboarding, subdomain phải không null, dài tối đa 20 ký tự và unique bằng pessimistic write lock; companyPhoneNumber cũng phải unique bằng pessimistic write lock.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#validateTenantUniqueness + #validateSubdomain + SaasTenantRepository#findBySubdomainForUpdate + #findByCompanyPhoneNumberForUpdate" }
  - { id: "BR-CT-SAAS-TENANT-004", description: "Operation area codes trong onboarding/update phải resolve được từ MDM; service lưu operationRegionCode là parentCode và operationAreaCode là childrenCode.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#onboardSaasTenant + #createTenantOperationRegion + #updateTenantOperationArea + EcommerceMdmClient#resolveOperationAreaCodes" }
  - { id: "BR-CT-SAAS-TENANT-005", description: "Tenant mới onboard luôn bắt đầu stage=PROVISIONED và status=PROVISIONED, code được sinh sau khi có id theo tenant type và prefix QC/virtual, rồi lưu cache tenant basic info.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#createTenantEntity + #createTenantCode + #cacheResponseToRedis" }
  - { id: "BR-CT-SAAS-TENANT-006", description: "Onboarding thành công phải tạo các dữ liệu phụ trợ trong cùng transaction: stage history, operation areas, tiering solution, subscription, invoice info, business model và consultant assignment nếu feature yêu cầu.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#onboardSaasTenant + #createTenantStageTransitionHistory + #createTenantOperationRegion + #createTenantTierSolution + #createTenantSubscriptions + #createTenantInvoiceInfo + #createTenantBusinessModel + #assignConsultant" }
  - { id: "BR-CT-SAAS-TENANT-007", description: "Khi Inventory:InventoryStockV01 bật, onboarding yêu cầu city và ward; onboarding/provisioning default branch yêu cầu city, headOfficeAddress/address và companyPhoneNumber/phone; thiếu dữ liệu thì command fail.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#validateProvisioningLocation + #createTenantEntity + #publishTenantProvisionedEvent" }
  - { id: "BR-CT-SAAS-TENANT-008", description: "SaaS tenant chỉ được update thông tin cơ bản khi stage thuộc PROCUREMENT, PROVISIONED hoặc OPEN; đổi subdomain phải revalidate uniqueness, đổi phone/email phải validate format và phone uniqueness.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#updateSaasTenant + #updateTenantEntityFromRequest + #handlePhoneNumberUpdate + #handleEmailAddressUpdate" }
  - { id: "BR-CT-SAAS-TENANT-009", description: "Khi Purchase:PurchaseV02 bật và tenant type là GARAGE, invoiceCompanyName, taxCode và invoiceCompanyAddress là bắt buộc ở onboarding và trước khi complete tenant; invoiceCompanyEmailAddress nếu có phải đúng email format.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#validateTenantInvoiceInfo + #validateRequiredInvoiceInfoForTenantCompletion + TenantInvoiceInfoValidator" }
  - { id: "BR-CT-SAAS-TENANT-010", description: "Cập nhật invoice info không cho tenant đang temporary deactivating; nếu tenant đã ACTIVE/ACTIVATED thì sau commit publish TENANT_INVOICE_INFO_UPSERT_REQUESTED, còn inbound TENANT_INVOICE_INFO_UPDATED chỉ merge các field local đang blank.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#updateTenantInvoiceInfo + #handleTenantInvoiceInfoUpdated + #mergeMissingTenantInvoiceInfo + TenantInvoiceInfoUpdatedListener + TenantInvoiceInfoUpdatedConsumer" }
  - { id: "BR-CT-SAAS-TENANT-011", description: "Khi Marketplace:QuotationConsultant bật, GARAGE tenant onboarding/update/complete/reactivate phải có consultant ACTIVE từ HRMS; VENDOR tenant bị bỏ qua trong assignment flow.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#assignConsultant + #validateConsultantAssignment + #validateConsultantsExist + #processConsultantAssignment" }
  - { id: "BR-CT-SAAS-TENANT-012", description: "Mỗi GARAGE tenant chỉ có một ConsultantAssignment ACTIVE tại một thời điểm; assign trùng active là idempotent, assign lại bản ghi inactive thì reactivate, còn assignment active khác bị chuyển INACTIVE.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#createConsultantAssignments + #processConsultantAssignment + #reactivateAssignment + #createNewAssignment + #inactivateAllAssignments" }
  - { id: "BR-CT-SAAS-TENANT-013", description: "Complete tenant chỉ xử lý tenants đang stage=PROVISIONED; sau validation sẽ chuyển stage=OPEN, status=ACTIVATING, request default branch/warehouse và publish ActiveTenantEvent.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#completedTenantInfo + #createDefaultBranchAndWarehouse + ActiveTenantEvent" }
  - { id: "BR-CT-SAAS-TENANT-014", description: "ActiveTenantEvent điều phối activation: gọi Jenkins tạo subdomain, publish TENANT-ACTIVATION / ACTIVATED.1, tạo IAM cho tenant users chưa có iamUserId, rồi giữ tenant status ở ACTIVATING để job/probe chốt trạng thái.", cornerstone: true, enforcement_point: "ActiveTenantListener#handleActiveTenantEvent + #processSingleTenant + #triggerSubdomainCreation + #publishTenantActivationMessage + #updateTenantStatus" }
  - { id: "BR-CT-SAAS-TENANT-015", description: "Default branch/warehouse không được tạo trực tiếp trong service; khi Inventory:InventoryStockV01 bật và tenant chưa có branch, service publish TENANT-PROVISIONING / TENANT_PROVISIONED.1 để downstream tạo branch/warehouse.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#createDefaultBranchAndWarehouse + #publishTenantProvisionedEvent + TenantProvisionedEventPublisher" }
  - { id: "BR-CT-SAAS-TENANT-016", description: "Branch lifecycle consumer chỉ xử lý MessageGroup=BRANCH-LIFECYCLE với MessageStep=BRANCH_CREATED.1 hoặc WAREHOUSE_CREATED.1 khi feature-flag.inventory-stock.enabled và Inventory:InventoryStockV01 bật; message khác bị skip và ack.", cornerstone: true, enforcement_point: "BranchLifecycleEventListener#handleBranchLifecycleEvent + @ConditionalOnProperty + @FeatureOn" }
  - { id: "BR-CT-SAAS-TENANT-017", description: "BranchCreatedEvent và WarehouseCreatedEvent là idempotent theo tenantId+branchCode hoặc tenantId+warehouseCode; WarehouseCreatedEvent bắt buộc branch tương ứng đã tồn tại, nếu chưa có thì throw để Kafka retry.", cornerstone: true, enforcement_point: "TenantActivationService#saveBranchFromGfSystem + #syncWarehouseMasterData + SaasTenantBranchRepository + SaasTenantWarehouseRepository" }
  - { id: "BR-CT-SAAS-TENANT-018", description: "Toggle tenant chỉ hợp lệ khi stage hiện tại là ACTIVE hoặc INACTIVE; deactivate bắt buộc reason không blank và tối đa 255 ký tự, activate phải qua consultant validation nếu feature bật.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#toggleTenant + #validateConsultantAssignment" }
  - { id: "BR-CT-SAAS-TENANT-019", description: "Toggle active/inactive cập nhật stage theo target state nhưng status theo trạng thái chuyển tiếp ACTIVATING/DEACTIVATING, ghi stage transition history, sync accounting, trigger IAM khi activate và gọi Jenkins activate/deactivate subdomain.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#toggleTenant + #triggerCreateTenantUser + #syncTenantToAccounting + #triggerActiveOrDeactivateTenant" }
  - { id: "BR-CT-SAAS-TENANT-020", description: "Job updateTenantStatus chốt trạng thái bằng cách probe https://{subdomain}.{host}; ACTIVATING + domain reachable thành ACTIVE/ACTIVATED, DEACTIVATING + domain unreachable thành INACTIVE/DEACTIVATED và sync accounting.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#updateTenantStatus" }
  - { id: "BR-CT-SAAS-TENANT-021", description: "Manual create tenant user yêu cầu tenant và subscription tồn tại, fullName/phone không rỗng, phone unique toàn hệ thống, email hợp lệ nếu có và role hợp lệ theo tenant type.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#createSaasTenantUser + #getUserRole + SaasTenantUserRepository#existsByPhoneNumber" }
  - { id: "BR-CT-SAAS-TENANT-022", description: "Role manual create map OWNER hoặc role rỗng thành GARAGE_OWNER/VENDOR_OWNER; GARAGE chỉ nhận thêm CA, VENDOR chỉ nhận thêm EXPRESS_EMPLOYEE và EXPRESS_EMPLOYEE được gán expressTenantCode sau khi có id.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#getUserRole + #createSaasTenantUser + CommonUtils#generateExpressTenantCode" }
  - { id: "BR-CT-SAAS-TENANT-023", description: "Manual create tenant user chỉ trigger IAM ngay khi tenant status là ACTIVATED hoặc ACTIVATING; nếu IAM thành công thì sync accounting, còn tenant chưa activation chỉ lưu user local.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#createSaasTenantUser + #triggerIamUserCreation + #syncTenantToAccounting" }
  - { id: "BR-CT-SAAS-TENANT-024", description: "IAM SaaS user creation lấy operation area codes làm IAM regions; success set iamUserId, temporaryPassword, iamCreationStatus=SUCCEED, status=ACTIVE, publish TenantUserCreatedEvent và sync conversation user; failure set iamCreationStatus=FAILED.", cornerstone: true, enforcement_point: "IamServiceImpl#createSaasTenantUser + TenantUserCreatedPublisher + ConversationServiceImpl#createConversationUserWithRetry" }
  - { id: "BR-CT-SAAS-TENANT-025", description: "Retry IAM chỉ xử lý tenant users có iamCreationStatus=FAILED; retry conversation chỉ xử lý tenant users đã có iamUserId.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#retryIamCreation + #retryConversationIamCreation + #getTenantData" }
  - { id: "BR-CT-SAAS-TENANT-026", description: "TenantUserProvisionRequestedEvent bị fail nếu cùng tenant type + phone đang ACTIVE ở bất kỳ tenant nào; nếu đã có iamUserId thì reuse identity, inactive user ở tenant khác và activate tenant hiện tại, nếu chưa có thì tạo IAM mới.", cornerstone: true, enforcement_point: "EmployeeServiceImpl#handleTenantUserProvisionRequested + #updateExistingIamUser + #createNewIamUser + #inactiveUsersInOtherTenants" }
  - { id: "BR-CT-SAAS-TENANT-027", description: "Enable request không activate nếu iamUserId đã ACTIVE ở bất kỳ tenant nào; disable/terminate chuyển local TenantUser sang INACTIVE, và terminate chỉ đổi IAM status khi user không còn account ACTIVE ở tenant khác.", cornerstone: true, enforcement_point: "EmployeeServiceImpl#handleTenantUserEnableRequested + #handleTenantUserDisableRequested + #handleEmployeeTerminated + #validateAndActivateLocalUser + #hasActiveAccountsInOtherTenants" }
  - { id: "BR-CT-SAAS-TENANT-028", description: "Employee branch changed và role changed events chỉ update IAM protected user info; local TenantUser hiện không lưu branch và không mutate roleCode trong hai flow này.", cornerstone: true, enforcement_point: "EmployeeServiceImpl#handleEmployeeBranchChanged + #handleEmployeeRoleChanged + IamProtectedClient#updateUserInfo" }
  - { id: "BR-CT-SAAS-TENANT-029", description: "Các Kafka consumer tenant-user/employee chỉ acknowledge sau khi service xử lý thành công; lỗi được rethrow để container retry hoặc xử lý theo cấu hình Kafka.", cornerstone: true, enforcement_point: "TenantUserProvisionRequestConsumer + TenantUserDisableRequestedConsumer + TenantUserEnableRequestedConsumer + EmployeeBranchChangedConsumer + EmployeeRoleChangedConsumer + EmployeeTerminatedConsumer" }
  - { id: "BR-CT-SAAS-TENANT-030", description: "Tenant invoice, transporter registry và branch lifecycle consumers route bằng MessageGroup/MessageStep; message không supported được skip và acknowledge, message supported lỗi thì rethrow để retry.", cornerstone: true, enforcement_point: "TenantInvoiceInfoUpdatedConsumer + TenantTransporterRegistryConsumer + BranchLifecycleEventListener" }
  - { id: "BR-CT-SAAS-TENANT-031", description: "Create/upsert TenantTransporterRegistry yêu cầu Tenant tồn tại, các field transporterName/routeName/routeContactPhoneNumber/routeStartedAt/shippingAddress không blank, status parse được ACTIVE/INACTIVE và routeContactPhoneNumber unique trong tenant.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#createTenantTransporterRegistries + #handleTenantTransporterRegistryUpserted + #validateTenantTransporterRegistryPayload + #validateTransporterRouteContactPhoneNumberUnique + #resolveTransporterRegistryStatus" }
  - { id: "BR-CT-SAAS-TENANT-032", description: "TenantTransporterRegistry create/import/new Kafka upsert publish TENANT_TRANSPORTER_REGISTRY_UPSERT_REQUESTED sau commit; Kafka delete cần tenantId và copTransporterRegistryId, tìm thấy thì hard delete local registry.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#buildTenantTransporterRegistryCreatedEvent + TenantTransporterRegistryCreatedListener + #handleTenantTransporterRegistryDeleted" }
  - { id: "BR-CT-SAAS-TENANT-033", description: "Bulk edit transporter registry hiện chạy khi Purchase:PurchaseV02 tắt và skip khi bật; flow này chưa enforce duplicate routeContactPhoneNumber và delete/update theo id không kiểm tra ownership tenantId.", cornerstone: false, enforcement_point: "SaasTenantServiceImpl#editTenantTransporterRegistry" }
  - { id: "BR-CT-SAAS-TENANT-034", description: "Vehicle profile edit yêu cầu Tenant tồn tại; xóa được theo id hoặc brandCode, thêm profile phải resolve hierarchy từ MDM và lọc modelCode đã tồn tại trong cùng tenantId+brandCode.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#editTenantVehicleProfile + #handleRemoveProfiles + #buildNewProfileRequests + #fetchCatalogContent" }
  - { id: "BR-CT-SAAS-TENANT-035", description: "Vehicle import verify chuẩn hóa tên thành code theo directory, chỉ valid khi brand tồn tại, model thuộc brand, year thuộc model và trim nếu có thuộc year; import chỉ lưu các dòng request có isValid=true.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#verifyImportVehicleTenantResponse + #processRequestVehicleTenant + #importVehicleTenant + #generateCode" }
  - { id: "BR-CT-SAAS-TENANT-036", description: "addAllVehicle thay thế toàn bộ vehicle profile của tenant bằng một wildcard brandCode='*'; DB hiện không có unique constraint nên duplicate prevention của vehicle profile chủ yếu nằm ở service edit flow, không bao phủ import batch.", cornerstone: false, enforcement_point: "SaasTenantServiceImpl#addAllVehicle + SaasTenantVehicleProfileRepository" }
  - { id: "BR-CT-SAAS-TENANT-037", description: "Transporter import verify chỉ nhận tenantCode tồn tại và đánh dấu invalid khi routeContactPhoneNumber đã có trong DB hoặc trùng trong cùng file; import persist các dòng request được gửi vào mà không tự lọc lại isValid.", cornerstone: false, enforcement_point: "SaasTenantServiceImpl#verifyImportTransportTenantResponse + #processRequest + #buildTransportRegistryTenant + #importTransportTenantResponse" }
  - { id: "BR-CT-SAAS-TENANT-038", description: "Cache tenant basic info được ghi sau onboarding và reload sau update tenant, invoice info, transporter registry; cache miss hoặc cache manager null thì endpoint cache fallback về DB/read model.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#cacheResponseToRedis + #reloadTenantCacheWithId + #getTenantBasicInfoFromCache + #findTenantInCache" }
  - { id: "BR-CT-SAAS-TENANT-039", description: "Protected get tenant IAM users chỉ trả TenantUser có iamCreationStatus=SUCCEED và status=ACTIVE, có thể filter roleCode; đây là read contract cho internal consumers.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#getTenantUsersByTenantId" }
  - { id: "BR-CT-SAAS-TENANT-040", description: "Tenant sync-to-accounting publish TENANT-ACTIVATION / SYNC_TO_ACCOUNTING.1 với base tenant và express tenant nếu có EXPRESS_EMPLOYEE; lỗi publish chỉ log và không rollback command chính.", cornerstone: true, enforcement_point: "SaasTenantServiceImpl#syncTenantToAccounting + TenantMessage.buildHeaders + TenantActivationPublisher" }

integrations:
  inbound:
    - type: API
      source: "Back-office / SaaS control-plane clients"
      purpose: "Quản lý vòng đời SaaS tenant qua /api/v1/saas-tenant, gồm onboarding, update, completion/activation, tenant users, vehicle profiles, transporter registries, consultant assignment, import/verify, retry IAM và các read APIs phục vụ cache."
    - type: API
      source: "cp-bpm-rules"
      purpose: "Dùng protected endpoints tại GET /protected/v1/saas-tenant/vendors để lấy thông tin vendor."
    - type: API
      source: "cp-bpm-cases"
      purpose: "Dùng protected endpoints tại POST /protected/v1/saas-tenant/search-basic-info để tìm kiếm SaaS tenant basic information."
    - type: API
      source: "cp-ecommerce-order"
      purpose: "Dùng protected endpoints tại POST /protected/v1/saas-tenant/search-basic-info, GET /protected/v1/saas-tenant/users, POST /protected/v1/saas-tenant/tenant-transporter-registry và POST /protected/v1/saas-tenant/search để tìm tenant basic information, lấy tenant IAM users, lấy transporter registries và tìm kiếm SaaS tenants."
    - type: API
      source: "cp-fee"
      purpose: "Dùng protected endpoints tại POST /protected/v1/saas-tenant/search-basic-info để tìm kiếm SaaS tenant basic information."
    - type: API
      source: "cp-bpm-workflow-m"
      purpose: "Dùng protected endpoints tại GET /protected/v1/saas-tenant/{tenantId} và GET /protected/v1/saas-tenant/users để lấy SaaS tenant basic information và tenant IAM users."
    - type: API
      source: "gf-purchase"
      purpose: "Dùng protected endpoints tại GET /protected/v1/saas-tenant/{tenantId}, GET /protected/v1/saas-tenant/users, POST /protected/v1/saas-tenant/{tenantId}/tc-data-privacy-confirmed, POST /protected/v1/saas-tenant/{tenantId}/ecommerce-confirmed và PUT /protected/v1/saas-tenant/{userId}/status để lấy tenant context, lấy tenant IAM users, xác nhận terms/data privacy, xác nhận ecommerce readiness và cập nhật tenant user status."
    - type: API
      source: "cp-erp-hrms-hr"
      purpose: "Dùng protected endpoints tại GET /protected/v1/saas-tenant/{tenantId}/consultant-assignment để lấy thông tin consultant assignment của tenant."
    - type: API
      source: "gf-notification"
      purpose: "Dùng protected endpoints tại GET /protected/v1/saas-tenant/users để lấy tenant IAM users."
    - type: API
      source: "cp-bpm-worker"
      purpose: "Dùng protected endpoints tại POST /protected/v1/saas-tenant/update-tenant-status để trigger tenant activation/deactivation status probing."
    - type: API
      source: "ct-notihub-notification"
      purpose: "Dùng legacy protected endpoints tại GET /protected/v1/tenants/users để lấy tenant users."
    - type: API
      source: "PT tenant user clients"
      purpose: "Tạo SaaS tenant users qua /api/pt/saas-tenant/create-user và provision user qua PT IAM flow."
    - type: API
      source: "Legacy tenant clients"
      purpose: "Các legacy callers vẫn gọi /api/v1/tenants và /protected/v1/tenants endpoints; code đánh dấu các flow này là deprecated và SaaS path là source of truth hiện hành."
    - type: EVENT
      source: "Kafka - tenant user lifecycle request producers"
      purpose: "Consume AC-DEV-TENANT-USER-PROVISION-REQUESTS, AC-DEV-TENANT-USER-DISABLE-REQUESTS và AC-DEV-TENANT-USER-ENABLE-REQUESTS; EmployeeServiceImpl tạo hoặc reuse IAM users, cập nhật trạng thái local tenant_user và phát result events."
    - type: EVENT
      source: "Kafka - employee lifecycle producers"
      purpose: "Consume AC-DEV-EMPLOYEE-BRANCH-CHANGED, AC-DEV-EMPLOYEE-ROLE-CHANGED và AC-DEV-EMPLOYEE-TERMINATED; cập nhật IAM protected user info/status và trạng thái local SaaS tenant user."
    - type: EVENT
      source: "Kafka - tenant invoice profile producers"
      purpose: "Consume AC-DEV-TENANT-INVOICE-INFO với TENANT_INVOICE_PROFILE_EVENTS / TENANT_INVOICE_INFO_UPDATED; merge invoice info vào SaaS tenant records và reload tenant cache."
    - type: EVENT
      source: "Kafka - tenant transporter registry producers"
      purpose: "Consume AC-DEV-TENANT-TRANSPORTER-REGISTRY-TOPIC với TENANT_TRANSPORTER_REGISTRY_UPSERTED hoặc TENANT_TRANSPORTER_REGISTRY_DELETED; upsert/delete local transporter registry read model và reload tenant cache."
    - type: EVENT
      source: "gf-system / gf-inventory"
      purpose: "Consume AC-DEV-BRANCH-LIFECYCLE với BRANCH-LIFECYCLE / BRANCH_CREATED.1 hoặc WAREHOUSE_CREATED.1 khi feature-flag.inventory-stock.enabled và Inventory:InventoryStockV01 bật; đồng bộ branch và warehouse master data."

  outbound:
    - type: API
      target: "sec-iam-service"
      purpose: "Tạo và duy trì tenant IAM users qua POST /users, POST /pt/users, POST /protected/users, PUT /protected/users/{userId}/info, PUT /protected/users/{userId}/status, PUT /protected/users/{userId}/subdomain, PUT /protected/users/{userId}/groupRoles và PUT /protected/users/batch/subdomain."
    - type: API
      target: "Jenkins webhook / Route53 automation"
      purpose: "Tạo, activate và deactivate tenant subdomains qua POST /generic-webhook-trigger/invoke?token=route53-api-trigger và POST /generic-webhook-trigger/invoke?token=activation-api-trigger."
    - type: API
      target: "cp-ecommerce-mdm"
      purpose: "Phân giải operation area codes, catalog hierarchy, vehicle brand/model codes và location names qua protected catalog/location APIs trong onboarding, search, import verification và response enrichment."
    - type: API
      target: "cp-cms-index-client"
      purpose: "CMSClient được cấu hình cho protected catalog lookup endpoints, nhưng hiện không có active runtime call path inject nó; các SaaS catalog/location flows trong SaasTenantServiceImpl dùng cp-ecommerce-mdm thay thế."
    - type: API
      target: "ct-conversation-client"
      purpose: "Tạo conversation users qua POST /protected/v1/conversations/user sau IAM user provisioning cho tenant users."
    - type: API
      target: "cp-erp-hrms-hr"
      purpose: "Validate và load active consultant employees qua GET /protected/v1/employees/consultant cho consultant assignment flows."
    - type: API
      target: "cp-pms-policy-master"
      purpose: "Lấy group role catalog qua GET /protected/groups/v1/list trong tenant user migration trước khi cập nhật IAM group roles."
    - type: API
      target: "Tenant runtime domains"
      purpose: "Probe GET https://{subdomain}.{garage-host|vendor-host} để chuyển tenant từ ACTIVATING/DEACTIVATING sang activation status cuối cùng."
    - type: EVENT
      target: "Kafka - AC-DEV-TENANT-ACTIVATION"
      purpose: "Publish TENANT-ACTIVATION / ACTIVATED.1 sau khi tenant hoàn tất thông tin; tùy chọn publish TENANT-ACTIVATION / SYNC_TO_ACCOUNTING.1 khi sync-to-accounting bật."
    - type: EVENT
      target: "Kafka - AC-DEV-TENANT-PROVISIONING"
      purpose: "Publish TENANT-PROVISIONING / TENANT_PROVISIONED.1 để yêu cầu default branch và warehouse provisioning khi Inventory:InventoryStockV01 flow bật."
    - type: EVENT
      target: "Kafka - tenant user lifecycle result topics"
      purpose: "Publish AC-DEV-TENANT-USER-CREATED-RESULTS, AC-DEV-TENANT-USER-PROVISION-RESULTS, AC-DEV-TENANT-USER-DISABLE-RESULTS và AC-DEV-TENANT-USER-ENABLE-RESULTS sau IAM/user lifecycle processing."
    - type: EVENT
      target: "Kafka - AC-DEV-TENANT-INVOICE-INFO"
      purpose: "Publish TENANT_INVOICE_PROFILE_COMMANDS / TENANT_INVOICE_INFO_UPSERT_REQUESTED sau khi thay đổi invoice info của activated tenant commit."
    - type: EVENT
      target: "Kafka - AC-DEV-TENANT-TRANSPORTER-REGISTRY-TOPIC"
      purpose: "Publish TENANT-TRANSPORTER-REGISTRY / TENANT_TRANSPORTER_REGISTRY_UPSERT_REQUESTED sau khi thay đổi local transporter registry commit."
    - type: EVENT
      target: "Kafka - AC-DEV-TENANT-SYNC-USER"
      purpose: "TenantSyncUserPublisher có thể publish USER / USER.1, nhưng call paths hiện tại trong ActiveTenantListener và SaasTenantServiceImpl đang comment."

dependencies:
  - { name: "Spring Boot Web", type: "framework", purpose: "Runtime nền cho REST controllers, JSON HTTP APIs, multipart upload và Spring application lifecycle của tenant-service.", config_ref: "build.gradle:spring-boot-starter-web; TenantServiceApplication; server.port; server.servlet.context-path; spring.application.name" }
  - { name: "Spring Data JPA / Hibernate", type: "framework", purpose: "ORM/repository layer cho SaaS tenant aggregates, custom queries, transactions và auditing user cập nhật từ security context.", config_ref: "build.gradle:spring-boot-starter-data-jpa; spring.jpa.*; JpaConfig" }
  - { name: "PostgreSQL", type: "database", purpose: "Kho dữ liệu quan hệ chính cho tenant lifecycle, tenant users, subscription, branch/warehouse projections, vehicle profiles, transporter registry và assignment data.", config_ref: "spring.datasource.*; DB_HOST; DB_PORT; DB_NAME; DB_USERNAME; DB_PASSWORD; DB_SCHEMA" }
  - { name: "Flyway", type: "framework", purpose: "Quản lý database migrations khởi tạo và cập nhật schema cho tenant, branch/warehouse và transporter registry tables.", config_ref: "build.gradle:flyway-core,flyway-database-postgresql; spring.flyway.*; src/main/resources/db/migration" }
  - { name: "Apache Kafka / Spring Kafka", type: "broker", purpose: "Event broker cho tenant activation/provisioning, tenant-user lifecycle, employee lifecycle, invoice profile, transporter registry và branch/warehouse lifecycle events.", config_ref: "build.gradle:spring-kafka,kafka-clients; KafkaConfig; kafka.bootstrap-servers; kafka.consumer.*; kafka.topics.*" }
  - { name: "Redis / Spring Data Redis (Lettuce)", type: "cache", purpose: "Cache tenant basic info và security/permission related cache managers/templates dùng Redis standalone.", config_ref: "build.gradle:spring-boot-starter-data-redis; CacheConfig; spring.data.redis.*; app.cache.key-prefix; actechx.security.permission.cache.*" }
  - { name: "com.actechx.common:spring-security-starter", type: "auth", purpose: "Cung cấp security context/JWT helpers cho role checks, auditor username, Authorization header forwarding và protected endpoint authorization.", config_ref: "build.gradle:spring-security-starter; actechx.security.*; internal-service.api-key; internal.api.key; SecurityUtils usage; @PreAuthorize" }
  - { name: "com.actechx.common:spring-feature-flag-starter", type: "framework", purpose: "Feature flag runtime cho Marketplace:QuotationConsultant, Inventory:InventoryStockV01, Purchase:PurchaseV02 và Insurance:Garage gates.", config_ref: "build.gradle:spring-feature-flag-starter; feature-flag.*; feature-flags.json; FeatureFlagHelper; @FeatureOn" }
  - { name: "Spring Web RestClient / HTTP service proxies", type: "api_client", purpose: "Hạ tầng typed outbound HTTP client cho service integrations và plain runtime-domain probing; các target API cụ thể được mô tả trong integrations.", config_ref: "HttpClientConfig; iam-service.url; jenkins-domain.url; cp-ecommerce-mdm.url; cp-erp-hrms.url; ct-conversation-client.url; cp-pms-policy-master.url; cp-cms-index-client.url; vendor-host; garage-host" }
  - { name: "Spring Retry", type: "framework", purpose: "Retry bằng annotation cho các lời gọi IAM/PT IAM user provisioning được phép retry khi gặp lỗi tạm thời.", config_ref: "build.gradle:spring-retry,spring-aspects; RetryConfig; @Retryable in IamServiceImpl and PTIamServiceImpl" }
  - { name: "Spring Async / TaskExecutor", type: "framework", purpose: "Chạy tác vụ nền bất đồng bộ, hiện có executor tuần tự cho default branch migration/background processing.", config_ref: "TenantServiceApplication @EnableAsync; AsyncConfig; migrationTaskExecutor" }
  - { name: "Spring Boot Validation", type: "framework", purpose: "Bean validation cho request DTOs và input validation ở controller/service trong onboarding, user creation, import và migration APIs.", config_ref: "build.gradle:spring-boot-starter-validation; @Valid usage in controllers; jakarta.validation annotations on request models" }
  - { name: "Springdoc OpenAPI", type: "api_documentation", purpose: "Sinh Swagger/OpenAPI documentation UI và hỗ trợ annotation mô tả API trên tenant user và migration endpoints.", config_ref: "build.gradle:springdoc-openapi-starter-webmvc-ui; io.swagger.v3 annotations" }
  - { name: "com.actechx.common common messaging/classes", type: "framework", purpose: "Tiện ích dùng chung cho Kafka message envelope/handler/publisher và common DTO/result classes dùng bởi tenant event publishers/consumers.", config_ref: "build.gradle:common-classes; KafkaMessagePublisher; KafkaMessageHandler" }
  - { name: "com.actechx.common:spring-logging-starter", type: "framework", purpose: "Hạ tầng logging dùng chung cho service logs và diagnostic output trong controllers, listeners, background processors.", config_ref: "build.gradle:spring-logging-starter; Lombok @Slf4j/@Log4j2 usage" }
  - { name: "com.actechx.common:spring-otlp-starter", type: "framework", purpose: "OTLP observability starter được include qua default profile để bật tracing/telemetry khi runtime có collector/config phù hợp.", config_ref: "build.gradle:spring-otlp-starter; spring.profiles.include=otlp" }
